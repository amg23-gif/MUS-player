name: Build APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Setup Android SDK
          uses: android-actions/setup-android@v3

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v3
          with:
            gradle-version: '8.4'

        - name: Generate Gradle Wrapper
          working-directory: android
          run: gradle wrapper --gradle-version=8.4 --distribution-type=bin

        - name: Make gradlew executable
          run: chmod +x android/gradlew

        - name: Build Release APK
          working-directory: android
          run: ./gradlew assembleRelease --no-daemon

        - name: Prepare APK
          run: |
            mkdir -p output
            find android/app/build/outputs/apk -name '*.apk' -type f -exec cp {} output/MUS-Player.apk \;
            ls -lh output/

        - name: Upload to GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: v1.0
            name: "MUS Player v1.0"
            body: |
              ## مشغّل IPTV للهاتف والتلفاز
              - حمّل ملف MUS-Player.apk وثبّته على جهازك
              - فعّل السماح بالتثبيت من مصادر غير معروفة في الإعدادات
            files: output/MUS-Player.apk
            make_latest: true