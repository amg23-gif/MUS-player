name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.4 --distribution-type=bin

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Find and Upload APK
        run: |
          echo '=== APK files found ==='
          find android/app/build/outputs/apk -name '*.apk' -type f
          mkdir -p output
          find android/app/build/outputs/apk -name '*.apk' -type f -exec cp {} output/MUS-Player.apk \;
          echo 'APK copied successfully'
          ls -lh output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MUS-Player-APK
          path: output/MUS-Player.apk
          retention-days: 30
