<!DOCTYPE html>
  <html lang="ar" dir="rtl">
  <head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#07090f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="manifest" href="manifest.json"/>
  <title>MUS Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#07090f;--surface:#0c1020;--card:#111827;--border:#1e2a45;
    --accent:#e63946;--accent2:#c1121f;--text:#f1f5f9;--muted:#64748b;
    --live:#10b981;--gold:#f59e0b;--blue:#3b82f6;--r:12px;
    --font:'Cairo',system-ui,sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

  /* ─── Header ─── */
  header{background:linear-gradient(135deg,#090e20,#12082a);border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:200;backdrop-filter:blur(20px)}
  .hdr{max-width:1920px;margin:0 auto;height:64px;display:flex;align-items:center;padding:0 16px;gap:12px}
  .logo{display:flex;align-items:center;gap:8px;flex-shrink:0;text-decoration:none}
  .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),#7c0012);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;box-shadow:0 0 20px rgba(230,57,70,.4)}
  .logo-text h1{font-size:17px;font-weight:900;color:var(--text)}
  .logo-text small{font-size:9px;color:var(--gold);display:block;font-weight:700;letter-spacing:1px}
  .search-wrap{flex:1;max-width:360px;position:relative}
  #sq{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:8px;padding:10px 16px 10px 40px;color:var(--text);font-size:14px;outline:none;font-family:var(--font);transition:.2s}
  #sq:focus{border-color:var(--accent);background:rgba(255,255,255,.08)}
  .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
  .hdr-right{margin-right:auto;display:flex;gap:8px;align-items:center}
  .ibtn{width:42px;height:42px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:.2s}
  .ibtn:hover,.ibtn:focus{background:rgba(255,255,255,.07);color:var(--text);outline:none}
  .ibtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* ─── Layout ─── */
  .layout{flex:1;display:flex;max-width:1920px;margin:0 auto;width:100%;min-height:calc(100vh - 64px)}
  .sidebar{width:320px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;height:calc(100vh - 64px);position:sticky;top:64px;overflow:hidden;transition:width .25s}
  .sidebar.closed{width:0;overflow:hidden;border-left:none}
  .sb-head{padding:14px;border-bottom:1px solid var(--border);flex-shrink:0}
  .sb-head h2{font-size:10px;color:var(--muted);margin-bottom:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .cats{display:flex;gap:6px;flex-wrap:wrap}
  .cat{background:var(--card);border:1.5px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;transition:.2s;white-space:nowrap}
  .cat:hover{color:var(--text)}.cat.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .ch-list{flex:1;overflow-y:auto;padding:6px}
  .ch-item{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-radius:10px;margin-bottom:3px;border:2px solid transparent;background:rgba(255,255,255,.01);transition:.15s;outline:none}
  .ch-item:hover{background:rgba(255,255,255,.04)}
  .ch-item.active{border-color:var(--accent)!important;background:rgba(230,57,70,.1)!important}
  .ch-item.focused{border-color:var(--gold);background:rgba(245,158,11,.08)}
  .ch-thumb{width:50px;height:32px;border-radius:6px;background:#000;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .ch-thumb img{width:100%;height:100%;object-fit:contain}
  .ch-info{flex:1;min-width:0}
  .ch-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch-sub{font-size:10px;color:var(--muted);margin-top:1px}
  .bdg{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:800}
  .b-live{background:rgba(16,185,129,.15);color:var(--live)}
  .b-hd{background:rgba(245,158,11,.15);color:var(--gold)}
  .b-4k{background:rgba(139,92,246,.15);color:#8b5cf6}
  .fav-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--muted);padding:3px;transition:.2s;flex-shrink:0}
  .fav-btn:hover{transform:scale(1.3)}.fav-btn.on{color:var(--gold)}

  /* ─── Main ─── */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .player-wrap{position:relative;background:#000;width:100%;aspect-ratio:16/9;overflow:hidden;border-bottom:2px solid rgba(230,57,70,.15)}
  video{width:100%;height:100%;display:block;object-fit:contain}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(7,9,15,.93);z-index:10;backdrop-filter:blur(12px);transition:opacity .3s}
  .overlay.gone{opacity:0;pointer-events:none}
  .ov-logo{width:90px;height:90px;background:linear-gradient(135deg,var(--accent),#7c0012);border-radius:var(--r);display:flex;align-items:center;justify-content:center;margin-bottom:14px;overflow:hidden;box-shadow:0 0 40px rgba(230,57,70,.3)}
  .ov-logo img{width:100%;height:100%;object-fit:cover}
  .ov-title{font-size:16px;font-weight:700;margin-bottom:4px;text-align:center}
  .ov-sub{font-size:12px;color:var(--muted);text-align:center}
  .spinner{width:46px;height:46px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--live);margin-left:4px;animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

  .info-bar{background:var(--surface);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);min-height:52px}
  .info-name{font-size:16px;font-weight:800}
  .info-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .q-btns{display:flex;gap:6px;margin-right:auto;flex-wrap:wrap}
  .qb{background:var(--card);border:1.5px solid var(--border);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text);transition:.2s;font-family:var(--font);font-weight:700}
  .qb:hover{background:var(--border)}.qb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .err-bar{background:rgba(230,57,70,.07);border-top:1px solid rgba(230,57,70,.2);padding:10px 16px;display:none;align-items:center;gap:10px;flex-wrap:wrap}
  .err-bar span{font-size:13px;color:var(--accent)}
  .err-bar a{color:var(--gold);font-size:12px;text-decoration:none;padding:6px 14px;background:rgba(245,158,11,.1);border-radius:6px;border:1px solid rgba(245,158,11,.3)}
  .err-bar a:hover{background:rgba(245,158,11,.2)}
  .err-bar button{padding:7px 16px;background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-weight:700;font-family:var(--font);font-size:13px}

  /* ─── Grid ─── */
  .grid-area{padding:14px 16px 60px;flex:1;overflow-y:auto}
  .grid-title{font-size:17px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .g-cnt{font-size:13px;color:var(--muted);font-weight:600}
  .ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .gc{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:16px 10px;cursor:pointer;text-align:center;transition:.2s;outline:none}
  .gc:hover,.gc:focus{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 20px rgba(230,57,70,.12)}
  .gc-logo{width:64px;height:42px;display:flex;align-items:center;justify-content:center;background:#000;margin:0 auto 8px;border-radius:6px;overflow:hidden}
  .gc-logo img{width:100%;height:100%;object-fit:contain}
  .gc-name{font-size:12px;font-weight:700;margin-bottom:2px}
  .gc-sub{font-size:10px;color:var(--muted)}
  .no-res{text-align:center;padding:60px 20px;color:var(--muted)}
  .no-res .ni{font-size:44px;margin-bottom:10px;opacity:.4}

  /* ─── Toast ─── */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:10px 24px;border-radius:30px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.6);border:1px solid var(--border);font-size:13px;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .toast.ok{border-color:var(--live);color:var(--live)}
  .toast.err{border-color:var(--accent);color:var(--accent)}

  /* ─── Admin Panel ─── */
  .admin-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9000;display:none;padding:20px;overflow-y:auto;backdrop-filter:blur(6px)}
  .admin-bg.open{display:flex;align-items:flex-start;justify-content:center}
  .admin-box{background:#0c1120;border:1px solid #253050;border-radius:var(--r);width:100%;max-width:900px;margin-top:10px;box-shadow:0 40px 80px rgba(0,0,0,.8)}
  .admin-hd{background:linear-gradient(135deg,#0f1830,#1a0c2e);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--r) var(--r) 0 0;border-bottom:1px solid #253050}
  .admin-hd h2{font-size:17px;font-weight:900}
  .acls-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:.2s}
  .acls-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
  .admin-tabs{display:flex;border-bottom:1px solid #253050;overflow-x:auto}
  .atab{padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:.2s;white-space:nowrap;font-size:13px;font-weight:700}
  .atab:hover{color:var(--text)}.atab.on{border-bottom-color:var(--accent);color:var(--text)}
  .admin-body{padding:20px}
  .sec{display:none}.sec.on{display:block}
  .lbl{display:block;margin-bottom:4px;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
  .fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .fg{display:flex;flex-direction:column}
  .fi{background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:.2s;width:100%}
  .fi:focus{border-color:var(--accent)}.fi option{background:#0c1120}
  .stream-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
  .stream-row{display:flex;gap:8px;align-items:center}
  .stream-row .fi{flex:1}
  .sq-fi{max-width:80px!important;flex:none!important}
  .del-s{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.2);color:var(--accent);width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
  .del-s:hover{background:var(--accent);color:#fff}
  .add-stream{background:rgba(255,255,255,.02);border:1.5px dashed var(--border);color:var(--muted);padding:9px;border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--font);width:100%;transition:.2s;font-weight:600}
  .add-stream:hover{border-color:var(--accent);color:var(--accent)}
  .act-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .btn-p{background:var(--accent);border:none;color:#fff;padding:10px 22px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;font-family:var(--font);transition:.2s}
  .btn-p:hover{background:var(--accent2)}
  .btn-s{background:var(--card);border:1.5px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font);transition:.2s;font-weight:600}
  .btn-s:hover{background:var(--border)}
  .hr{border:none;border-top:1px solid var(--border);margin:16px 0}
  .ach-list{display:flex;flex-direction:column;gap:8px}
  .ach{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
  .ath{width:42px;height:28px;border-radius:4px;background:#000;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .ath img{width:100%;height:100%;object-fit:contain}
  .an{flex:1;min-width:0}
  .an strong{display:block;font-size:13px;font-weight:700}
  .an small{color:var(--muted);font-size:10px}
  .aa{display:flex;gap:6px}
  .aa button{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:var(--font);transition:.2s}
  .be{background:rgba(59,130,246,.12);color:var(--blue)}.be:hover{background:var(--blue);color:#fff}
  .bd{background:rgba(230,57,70,.1);color:var(--accent)}.bd:hover{background:var(--accent);color:#fff}
  .m3u-ta{width:100%;min-height:140px;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:monospace;font-size:11px;resize:vertical;outline:none;direction:ltr}
  .m3u-ta:focus{border-color:var(--accent)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
  .stat-c{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
  .stat-v{font-size:28px;font-weight:900;color:var(--accent)}
  .stat-l{font-size:10px;color:var(--muted);margin-top:3px}
  .imp-st{margin-top:10px;font-size:13px;font-weight:700;min-height:20px}
  .imp-st.ok{color:var(--live)}.imp-st.err{color:var(--accent)}
  .adm-sch{background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;width:100%;margin-bottom:10px}
  .adm-sch:focus{border-color:var(--accent)}

  /* ─── Responsive ─── */
  @media(max-width:900px){
    .sidebar{width:280px}
    .ch-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  }
  @media(max-width:640px){
    .hdr{padding:0 10px;gap:8px}
    .logo-text h1{font-size:14px}
    .search-wrap{max-width:150px}
    .layout{flex-direction:column}
    .sidebar{width:100%;height:auto;position:relative;top:0;border-left:none;border-bottom:1px solid var(--border);max-height:260px}
    .sidebar.closed{max-height:0}
    .fg2{grid-template-columns:1fr}
    .admin-body{padding:14px}
  }
  @media(min-width:1920px){
    .ch-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  }
  </style>
  </head>
  <body>

  <header>
    <div class="hdr">
      <div class="logo">
        <div class="logo-icon">▶</div>
        <div class="logo-text"><h1>MUS Player</h1><small>IPTV • LIVE TV</small></div>
      </div>
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="search" id="sq" placeholder="ابحث عن قناة..." autocomplete="off" inputmode="search"/>
      </div>
      <div class="hdr-right">
        <button class="ibtn" id="favBtn" title="المفضلة" onclick="toggleFavView()">★</button>
        <button class="ibtn" id="sbBtn" title="القنوات" onclick="toggleSidebar()">☰</button>
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-head">
        <h2>التصنيفات</h2>
        <div class="cats" id="cats"></div>
      </div>
      <div class="ch-list" id="chList"></div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="player-wrap">
        <video id="vid" playsinline webkit-playsinline preload="none"></video>
        <div class="overlay" id="overlay">
          <div class="ov-logo" id="ovLogo">
            <img src="" id="ovImg" onerror="this.style.display='none'" style="display:none"/>
            <span id="ovIcon" style="font-size:32px">▶</span>
          </div>
          <div class="ov-title" id="ovTitle">MUS Player</div>
          <div class="ov-sub" id="ovSub">اختر قناة للبدء</div>
        </div>
      </div>

      <div class="info-bar" id="infoBar" style="display:none">
        <div>
          <div class="info-name" id="infoName"></div>
          <div class="info-sub" id="infoSub"></div>
        </div>
        <div class="q-btns" id="qBtns"></div>
        <button class="ibtn" id="favCurBtn" onclick="favCurrent()" title="مفضلة" style="margin-right:0">☆</button>
      </div>

      <div class="err-bar" id="errBar">
        <span id="errMsg">⚠ تعذّر تشغيل البث</span>
        <a id="vlcLink" href="#" style="display:none">فتح في VLC</a>
        <button onclick="retryCurrent()">إعادة المحاولة</button>
      </div>

      <div class="grid-area">
        <div class="grid-title">القنوات <span class="g-cnt" id="gCnt"></span></div>
        <div class="ch-grid" id="chGrid"></div>
        <div class="no-res" id="noRes" style="display:none"><div class="ni">📭</div>لا توجد نتائج</div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Admin Panel -->
  <div class="admin-bg" id="adminBg">
    <div class="admin-box">
      <div class="admin-hd">
        <h2>⚙ لوحة التحكم</h2>
        <button class="acls-btn" onclick="closeAdmin()">✕</button>
      </div>
      <div class="admin-tabs" id="adminTabs">
        <div class="atab on" data-tab="stats">📊 إحصاء</div>
        <div class="atab" data-tab="add">➕ إضافة</div>
        <div class="atab" data-tab="list">📋 القنوات</div>
        <div class="atab" data-tab="m3u">📥 استيراد M3U</div>
        <div class="atab" data-tab="backup">💾 نسخ احتياطي</div>
      </div>
      <div class="admin-body">

        <!-- Stats -->
        <div class="sec on" id="sec-stats">
          <div class="stat-grid" id="statGrid"></div>
          <div class="hr"></div>
          <button class="btn-s" onclick="clearAll()">🗑 حذف جميع القنوات</button>
        </div>

        <!-- Add / Edit -->
        <div class="sec" id="sec-add">
          <input type="hidden" id="editId" value=""/>
          <div class="fg2">
            <div class="fg"><label class="lbl">اسم القناة</label><input class="fi" id="aName" placeholder="مثال: قناة الجزيرة"/></div>
            <div class="fg"><label class="lbl">الوصف / اللغة</label><input class="fi" id="aAr" placeholder="مثال: عربي • إخبارية"/></div>
          </div>
          <div class="fg2">
            <div class="fg"><label class="lbl">التصنيف</label>
              <select class="fi" id="aCat">
                <option>عام</option><option>رياضة</option><option>أخبار</option>
                <option>أفلام</option><option>أطفال</option><option>دينية</option><option>موسيقى</option>
              </select>
            </div>
            <div class="fg"><label class="lbl">رابط الشعار (اختياري)</label><input class="fi" id="aLogo" placeholder="https://..."/></div>
          </div>
          <label class="lbl" style="margin-bottom:8px">روابط البث</label>
          <div class="stream-rows" id="streamRows"></div>
          <button class="add-stream" onclick="addStreamRow()">+ إضافة رابط جديد</button>
          <div class="act-row">
            <button class="btn-p" onclick="saveCh()">💾 حفظ القناة</button>
            <button class="btn-s" onclick="resetForm()">↺ مسح</button>
          </div>
        </div>

        <!-- List -->
        <div class="sec" id="sec-list">
          <input class="adm-sch" id="admSearch" placeholder="بحث في القنوات..." oninput="renderAdminList()"/>
          <div class="ach-list" id="achList"></div>
        </div>

        <!-- M3U Import -->
        <div class="sec" id="sec-m3u">
          <div class="fg" style="margin-bottom:12px">
            <label class="lbl">استيراد من رابط</label>
            <div style="display:flex;gap:8px">
              <input class="fi" id="m3uUrl" placeholder="http://example.com/list.m3u" dir="ltr"/>
              <button class="btn-p" onclick="importFromUrl()">تحميل</button>
            </div>
          </div>
          <div class="fg">
            <label class="lbl">أو الصق محتوى M3U</label>
            <textarea class="m3u-ta" id="m3uText" placeholder="#EXTM3U
#EXTINF:-1 tvg-name=..."></textarea>
          </div>
          <div class="act-row">
            <button class="btn-p" onclick="importFromText()">استيراد النص</button>
          </div>
          <div class="imp-st" id="impSt"></div>
        </div>

        <!-- Backup -->
        <div class="sec" id="sec-backup">
          <div class="act-row" style="margin-bottom:16px">
            <button class="btn-p" onclick="exportBackup()">📤 تصدير JSON</button>
            <label class="btn-s" style="cursor:pointer">📥 استيراد JSON <input type="file" accept=".json" style="display:none" onchange="importBackup(this)"/></label>
          </div>
          <div class="hr"></div>
          <label class="lbl">أو الصق JSON مباشرة</label>
          <textarea class="m3u-ta" id="jsonArea" placeholder='{"channels":[...]}'></textarea>
          <div class="act-row">
            <button class="btn-p" onclick="importFromJson()">استيراد</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
  // ═══════════════════════════════════════════════
  //  DATA
  // ═══════════════════════════════════════════════
  var TRIG = '\u0645\u0631\u0634\u0627\u062f\u0648'; // مرشادو
  var KEY  = 'mus_v2';
  var FKEY = 'mus_fav';

  var DEFAULT_CHS = [
    {id:1,name:'القناة الرئيسية',ar:'بث مباشر',cat:'عام',color:'#e63946',live:true,logo:'',
     streams:[{q:'HD',url:'http://164898475139.fug-26.com:80/live/0664002407/o0clgod3en/28938.m3u8'}]}
  ];

  var CHS  = loadChs();
  var FAVS = loadFavs();
  var activeCh   = null;
  var activeIdx  = 0;
  var activeCat  = 'الكل';
  var favView    = false;
  var focusedRow = -1;
  var hlsObj     = null;
  var searchVal  = '';
  var toastTimer = null;

  function loadChs(){
    try{var d=localStorage.getItem(KEY);if(!d)return DEFAULT_CHS.slice();var a=JSON.parse(d);return Array.isArray(a)&&a.length?a:DEFAULT_CHS.slice();}catch(e){return DEFAULT_CHS.slice();}
  }
  function saveChs(){try{localStorage.setItem(KEY,JSON.stringify(CHS));}catch(e){}}
  function loadFavs(){try{var d=localStorage.getItem(FKEY);return d?JSON.parse(d):[];}catch(e){return [];}}
  function saveFavs(){try{localStorage.setItem(FKEY,JSON.stringify(FAVS));}catch(e){}}
  function nextId(){return CHS.length?Math.max.apply(null,CHS.map(function(c){return c.id;}))+1:1;}

  // ═══════════════════════════════════════════════
  //  PLAYER
  // ═══════════════════════════════════════════════
  var vid = document.getElementById('vid');

  function destroyHls(){
    if(hlsObj){try{hlsObj.destroy();}catch(e){}hlsObj=null;}
  }

  function showOverlayIdle(ch,title,sub){
    var ov=document.getElementById('overlay');
    ov.classList.remove('gone');
    // clear spinner
    var sp=ov.querySelector('.spinner');
    if(sp)sp.remove();
    document.getElementById('ovTitle').textContent=title||'MUS Player';
    document.getElementById('ovSub').textContent=sub||'اختر قناة للبدء';
    var img=document.getElementById('ovImg');
    var icon=document.getElementById('ovIcon');
    if(ch&&ch.logo){img.src=ch.logo;img.style.display='';icon.style.display='none';}
    else{img.style.display='none';icon.style.display='';}
  }

  function showOverlayLoading(ch){
    var ov=document.getElementById('overlay');
    ov.classList.remove('gone');
    // add spinner if not present
    var sp=ov.querySelector('.spinner');
    if(!sp){sp=document.createElement('div');sp.className='spinner';ov.insertBefore(sp,ov.firstChild);}
    document.getElementById('ovTitle').textContent=ch?ch.name:'جاري التحميل...';
    document.getElementById('ovSub').textContent='يتصل بالبث...';
    var img=document.getElementById('ovImg');
    var icon=document.getElementById('ovIcon');
    if(ch&&ch.logo){img.src=ch.logo;img.style.display='';icon.style.display='none';}
    else{img.style.display='none';icon.style.display='';}
  }

  function hideOverlay(){
    document.getElementById('overlay').classList.add('gone');
    var sp=document.getElementById('overlay').querySelector('.spinner');
    if(sp)sp.remove();
  }

  function loadStream(url,ch){
    destroyHls();
    document.getElementById('errBar').style.display='none';
    showOverlayLoading(ch);

    // On HTTPS pages, try native <video> first for HTTP streams
    // This works on Android TV browsers and iOS Safari natively
    if(vid.canPlayType('application/vnd.apple.mpegurl')){
      // Native HLS (iOS Safari, some TV browsers)
      vid.src=url;
      vid.load();
      vid.oncanplay=function(){hideOverlay();vid.play().catch(function(){});};
      vid.onerror=function(){showError(url,ch,'تعذّر التشغيل');};
      return;
    }

    if(typeof Hls!=='undefined'&&Hls.isSupported()){
      hlsObj=new Hls({
        enableWorker:true,
        maxBufferLength:60,
        maxMaxBufferLength:120,
        xhrSetup:function(xhr){xhr.withCredentials=false;}
      });
      hlsObj.loadSource(url);
      hlsObj.attachMedia(vid);
      hlsObj.on(Hls.Events.MANIFEST_PARSED,function(){
        hideOverlay();
        vid.play().catch(function(){});
      });
      hlsObj.on(Hls.Events.ERROR,function(event,data){
        if(data.fatal){
          destroyHls();
          showError(url,ch,data.type==='networkError'?'خطأ في الشبكة':'خطأ في البث');
        }
      });
    } else {
      // Last resort: set src directly
      vid.src=url;
      vid.load();
      vid.oncanplay=function(){hideOverlay();vid.play().catch(function(){});};
      vid.onerror=function(){showError(url,ch,'المتصفح لا يدعم هذا البث');};
    }
  }

  function showError(url,ch,msg){
    showOverlayIdle(ch,'⚠ '+msg,'اضغط إعادة المحاولة أو افتح في مشغّل خارجي');
    var bar=document.getElementById('errBar');
    bar.style.display='flex';
    document.getElementById('errMsg').textContent='⚠ '+msg+' — '+( url.indexOf('http://')===0&&location.protocol==='https:'?'البث HTTP محجوب على HTTPS (عادي في المتصفحات)':'الرابط غير متاح');
    var vlc=document.getElementById('vlcLink');
    vlc.href='vlc://'+url.replace(/^https?:///,'');
    vlc.style.display='';
  }

  function retryCurrent(){
    if(activeCh)playCh(activeCh.id,activeIdx);
  }

  // ═══════════════════════════════════════════════
  //  PLAY CHANNEL
  // ═══════════════════════════════════════════════
  function playCh(id,idx){
    var ch=CHS.find(function(c){return c.id===id;});
    if(!ch)return;
    if(idx===undefined)idx=0;
    if(idx<0||idx>=ch.streams.length)idx=0;
    activeCh=ch;
    activeIdx=idx;

    // Info bar
    var bar=document.getElementById('infoBar');
    bar.style.display='flex';
    document.getElementById('infoName').textContent=ch.name;
    document.getElementById('infoSub').innerHTML=ch.ar+(ch.live?' <span class="live-dot"></span>':'');
    updateFavBtn();

    // Quality buttons
    var qh='';
    ch.streams.forEach(function(s,i){
      qh+='<button class="qb'+(i===idx?' on':'')+'" onclick="playCh('+id+','+i+')">'+s.q+'</button>';
    });
    document.getElementById('qBtns').innerHTML=qh;

    loadStream(ch.streams[idx].url,ch);
    render();
  }

  function updateFavBtn(){
    if(!activeCh)return;
    var btn=document.getElementById('favCurBtn');
    btn.textContent=FAVS.includes(activeCh.id)?'★':'☆';
    btn.style.color=FAVS.includes(activeCh.id)?'var(--gold)':'var(--muted)';
  }

  function favCurrent(){
    if(!activeCh)return;
    toggleFav(activeCh.id);
    updateFavBtn();
    toast(FAVS.includes(activeCh.id)?'أُضيف إلى المفضلة':'حُذف من المفضلة','ok');
  }

  // ═══════════════════════════════════════════════
  //  RENDER
  // ═══════════════════════════════════════════════
  function getFiltered(){
    var q=searchVal.trim().toLowerCase();
    var list=CHS.slice();
    if(favView)list=list.filter(function(c){return FAVS.includes(c.id);});
    if(activeCat!=='الكل')list=list.filter(function(c){return c.cat===activeCat;});
    if(q)list=list.filter(function(c){return (c.name+c.ar+c.cat).toLowerCase().includes(q);});
    return list;
  }

  function render(){
    var list=getFiltered();
    // Sidebar list
    var sHtml='';
    list.forEach(function(c){
      var isFav=FAVS.includes(c.id);
      var isAct=activeCh&&activeCh.id===c.id;
      var q=c.streams&&c.streams.length?c.streams[0].q:'';
      sHtml+='<div class="ch-item'+(isAct?' active':'')+'" data-id="'+c.id+'" onclick="playCh('+c.id+')" tabindex="0">';
      sHtml+='<div class="ch-thumb"><img src="'+(c.logo||'')+'" onerror="this.src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;50&quot; height=&quot;32&quot;><rect width=&quot;50&quot; height=&quot;32&quot; fill=&quot;%23111&quot;/><text x=&quot;25&quot; y=&quot;22&quot; text-anchor=&quot;middle&quot; fill=&quot;%23666&quot; font-size=&quot;14&quot;>📺</text></svg>'"/></div>';
      sHtml+='<div class="ch-info"><div class="ch-name">'+c.name+'</div>';
      sHtml+='<div class="ch-sub">'+c.cat+(c.live?' <span class="bdg b-live">LIVE</span>':'')+(q==='HD'?' <span class="bdg b-hd">HD</span>':q==='4K'?' <span class="bdg b-4k">4K</span>':'')+'</div></div>';
      sHtml+='<button class="fav-btn'+(isFav?' on':'')+'" onclick="event.stopPropagation();toggleFav('+c.id+')" title="مفضلة">'+(isFav?'★':'☆')+'</button>';
      sHtml+='</div>';
    });
    document.getElementById('chList').innerHTML=sHtml;

    // Grid
    var gHtml='';
    list.forEach(function(c){
      gHtml+='<div class="gc" onclick="playCh('+c.id+')" tabindex="0">';
      gHtml+='<div class="gc-logo"><img src="'+(c.logo||'')+'" onerror="this.src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;64&quot; height=&quot;42&quot;><rect width=&quot;64&quot; height=&quot;42&quot; fill=&quot;%23111&quot;/><text x=&quot;32&quot; y=&quot;28&quot; text-anchor=&quot;middle&quot; fill=&quot;%23666&quot; font-size=&quot;18&quot;>📺</text></svg>'"/></div>';
      gHtml+='<div class="gc-name">'+c.name+'</div><div class="gc-sub">'+c.cat+'</div></div>';
    });
    document.getElementById('chGrid').innerHTML=gHtml;
    document.getElementById('noRes').style.display=list.length?'none':'block';
    document.getElementById('gCnt').textContent='('+list.length+')';

    // Cats
    var cats=['الكل'];
    CHS.forEach(function(c){if(!cats.includes(c.cat))cats.push(c.cat);});
    document.getElementById('cats').innerHTML=cats.map(function(c){
      return '<div class="cat'+(activeCat===c?' on':'')+'" onclick="setCat(''+c+'')">'+c+'</div>';
    }).join('');
  }

  function setCat(c){activeCat=c;focusedRow=-1;render();}
  function toggleSidebar(){document.getElementById('sidebar').classList.toggle('closed');render();}
  function toggleFavView(){
    favView=!favView;
    document.getElementById('favBtn').classList.toggle('on',favView);
    render();
    toast(favView?'عرض المفضلة':'عرض الكل');
  }
  function toggleFav(id){
    var i=FAVS.indexOf(id);
    if(i>-1)FAVS.splice(i,1);else FAVS.push(id);
    saveFavs();render();
  }

  // ═══════════════════════════════════════════════
  //  SEARCH
  // ═══════════════════════════════════════════════
  document.getElementById('sq').addEventListener('input',function(){
    if(this.value===TRIG){this.value='';openAdmin();return;}
    searchVal=this.value;
    render();
  });

  // ═══════════════════════════════════════════════
  //  KEYBOARD / TV D-PAD
  // ═══════════════════════════════════════════════
  document.addEventListener('keydown',function(e){
    if(document.getElementById('adminBg').classList.contains('open'))return;
    var items=document.querySelectorAll('.ch-item');
    if(e.key==='ArrowDown'||e.key==='ArrowUp'){
      e.preventDefault();
      if(document.getElementById('sidebar').classList.contains('closed'))document.getElementById('sidebar').classList.remove('closed');
      focusedRow=e.key==='ArrowDown'?Math.min(focusedRow+1,items.length-1):Math.max(focusedRow-1,0);
      items.forEach(function(el,i){el.classList.toggle('focused',i===focusedRow);});
      if(items[focusedRow])items[focusedRow].scrollIntoView({behavior:'smooth',block:'nearest'});
      return;
    }
    if(e.key==='Enter'&&focusedRow>=0&&items[focusedRow]){
      e.preventDefault();
      playCh(parseInt(items[focusedRow].getAttribute('data-id')));return;
    }
    if((e.key==='ArrowLeft'||e.key==='ArrowRight')&&activeCh){
      e.preventDefault();
      var ni=activeIdx+(e.key==='ArrowLeft'?1:-1);
      if(ni>=0&&ni<activeCh.streams.length)playCh(activeCh.id,ni);return;
    }
    if(e.key===' '||e.key==='MediaPlayPause'){e.preventDefault();vid.paused?vid.play():vid.pause();return;}
    if(e.key==='Escape'||e.key==='Backspace'){
      if(activeCh){e.preventDefault();activeCh=null;destroyHls();vid.src='';showOverlayIdle(null,'MUS Player','اختر قناة للبدء');document.getElementById('infoBar').style.display='none';document.getElementById('errBar').style.display='none';render();}
      return;
    }
    if(e.key==='AudioVolumeUp'||e.key==='VolumeUp'){e.preventDefault();vid.volume=Math.min(vid.volume+.1,1);toast('صوت '+Math.round(vid.volume*100)+'%');return;}
    if(e.key==='AudioVolumeDown'||e.key==='VolumeDown'){e.preventDefault();vid.volume=Math.max(vid.volume-.1,0);toast('صوت '+Math.round(vid.volume*100)+'%');return;}
    if(e.key==='AudioVolumeMute'||e.key==='VolumeMute'){e.preventDefault();vid.muted=!vid.muted;toast(vid.muted?'صامت':'صوت مفعّل');return;}
  });

  // ═══════════════════════════════════════════════
  //  TOAST
  // ═══════════════════════════════════════════════
  function toast(msg,type){
    var el=document.getElementById('toast');
    el.textContent=msg;
    el.className='toast show'+(type?' '+type:'');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){el.classList.remove('show');},2200);
  }

  // ═══════════════════════════════════════════════
  //  ADMIN PANEL
  // ═══════════════════════════════════════════════
  function openAdmin(){
    document.getElementById('adminBg').classList.add('open');
    updateStats();
    renderAdminList();
  }
  function closeAdmin(){document.getElementById('adminBg').classList.remove('open');}
  document.getElementById('adminBg').addEventListener('click',function(e){if(e.target===this)closeAdmin();});

  document.getElementById('adminTabs').addEventListener('click',function(e){
    var tab=e.target.getAttribute('data-tab');
    if(!tab)return;
    document.querySelectorAll('.atab').forEach(function(t){t.classList.toggle('on',t.getAttribute('data-tab')===tab);});
    document.querySelectorAll('.sec').forEach(function(s){s.classList.toggle('on',s.id==='sec-'+tab);});
    if(tab==='stats')updateStats();
    if(tab==='list')renderAdminList();
  });

  function updateStats(){
    var cats={};CHS.forEach(function(c){cats[c.cat]=(cats[c.cat]||0)+1;});
    document.getElementById('statGrid').innerHTML=
      stat(CHS.length,'إجمالي القنوات')+stat(FAVS.length,'المفضلة')+
      stat(Object.keys(cats).length,'التصنيفات')+stat(CHS.filter(function(c){return c.live;}).length,'قنوات مباشرة');
  }
  function stat(v,l){return '<div class="stat-c"><div class="stat-v">'+v+'</div><div class="stat-l">'+l+'</div></div>';}

  function clearAll(){
    if(!confirm('هل أنت متأكد من حذف جميع القنوات؟'))return;
    CHS=[];saveChs();render();updateStats();renderAdminList();toast('تم الحذف','err');
  }

  // ─── Add / Edit ───
  function addStreamRow(q,url){
    var row=document.createElement('div');row.className='stream-row';
    row.innerHTML='<select class="fi sq-fi"><option>SD</option><option'+(q==='HD'?' selected':'')+'>HD</option><option'+(q==='4K'?' selected':'')+'>4K</option></select>'+
      '<input class="fi" type="url" placeholder="http://..." dir="ltr" value="'+(url||'')+'"/>'+
      '<button class="del-s" onclick="this.parentNode.remove()">✕</button>';
    document.getElementById('streamRows').appendChild(row);
  }

  function resetForm(){
    document.getElementById('editId').value='';
    document.getElementById('aName').value='';
    document.getElementById('aAr').value='';
    document.getElementById('aCat').value='عام';
    document.getElementById('aLogo').value='';
    document.getElementById('streamRows').innerHTML='';
    addStreamRow('HD','');
  }

  function editCh(id){
    var ch=CHS.find(function(c){return c.id===id;});if(!ch)return;
    document.getElementById('editId').value=id;
    document.getElementById('aName').value=ch.name;
    document.getElementById('aAr').value=ch.ar;
    document.getElementById('aCat').value=ch.cat;
    document.getElementById('aLogo').value=ch.logo||'';
    document.getElementById('streamRows').innerHTML='';
    ch.streams.forEach(function(s){addStreamRow(s.q,s.url);});
    // Switch to add tab
    document.querySelectorAll('.atab').forEach(function(t){t.classList.toggle('on',t.getAttribute('data-tab')==='add');});
    document.querySelectorAll('.sec').forEach(function(s){s.classList.toggle('on',s.id==='sec-add');});
  }

  function saveCh(){
    var name=document.getElementById('aName').value.trim();
    if(!name){toast('أدخل اسم القناة','err');return;}
    var rows=document.getElementById('streamRows').querySelectorAll('.stream-row');
    var streams=[];
    rows.forEach(function(r){
      var q=r.querySelector('select').value;
      var url=r.querySelectorAll('input')[0].value.trim();
      if(url)streams.push({q:q,url:url});
    });
    if(!streams.length){toast('أضف رابط بث واحد على الأقل','err');return;}
    var eid=document.getElementById('editId').value;
    if(eid){
      var idx=CHS.findIndex(function(c){return c.id===parseInt(eid);});
      if(idx>-1){CHS[idx]={id:parseInt(eid),name:name,ar:document.getElementById('aAr').value.trim(),cat:document.getElementById('aCat').value,logo:document.getElementById('aLogo').value.trim(),live:true,streams:streams};}
      toast('✓ تم التحديث','ok');
    } else {
      CHS.push({id:nextId(),name:name,ar:document.getElementById('aAr').value.trim(),cat:document.getElementById('aCat').value,logo:document.getElementById('aLogo').value.trim(),live:true,streams:streams});
      toast('✓ أُضيفت القناة','ok');
    }
    saveChs();render();resetForm();
  }

  function deleteCh(id){
    if(!confirm('حذف هذه القناة؟'))return;
    CHS=CHS.filter(function(c){return c.id!==id;});
    if(activeCh&&activeCh.id===id){activeCh=null;destroyHls();vid.src='';showOverlayIdle(null,'MUS Player','اختر قناة');document.getElementById('infoBar').style.display='none';}
    saveChs();render();renderAdminList();updateStats();toast('تم الحذف','err');
  }

  function renderAdminList(){
    var q=(document.getElementById('admSearch').value||'').toLowerCase();
    var list=CHS.filter(function(c){return !q||(c.name+c.ar+c.cat).toLowerCase().includes(q);});
    document.getElementById('achList').innerHTML=list.length?list.map(function(c){
      return '<div class="ach">'+
        '<div class="ath"><img src="'+(c.logo||'')+'" onerror="this.src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;42&quot; height=&quot;28&quot;><rect width=&quot;42&quot; height=&quot;28&quot; fill=&quot;%23111&quot;/></svg>'"/></div>'+
        '<div class="an"><strong>'+c.name+'</strong><small>'+c.cat+' — '+c.streams.length+' روابط</small></div>'+
        '<div class="aa"><button class="be" onclick="editCh('+c.id+')">✎ تعديل</button><button class="bd" onclick="deleteCh('+c.id+')">✕ حذف</button></div>'+
        '</div>';
    }).join(''):'<div style="text-align:center;padding:30px;color:var(--muted)">لا توجد قنوات</div>';
  }

  // ─── M3U ───
  function parseM3U(text){
    var lines=text.split('\n');var chs=[];var cur=null;
    lines.forEach(function(line){
      line=line.trim();
      if(line.startsWith('#EXTINF')){
        cur={id:nextId()+chs.length,name:'قناة جديدة',ar:'',cat:'عام',logo:'',live:true,streams:[]};
        var nm=line.match(/tvg-name="([^"]+)"/);if(nm)cur.name=nm[1];
        var lg=line.match(/tvg-logo="([^"]+)"/);if(lg)cur.logo=lg[1];
        var gr=line.match(/group-title="([^"]+)"/);if(gr)cur.cat=gr[1];
        var ct=line.indexOf(',');if(ct>-1&&!nm)cur.name=line.slice(ct+1).trim();
      } else if(cur&&(line.startsWith('http')||line.startsWith('rtmp'))){
        cur.streams.push({q:'HD',url:line});chs.push(cur);cur=null;
      }
    });
    return chs;
  }

  function importFromUrl(){
    var url=document.getElementById('m3uUrl').value.trim();
    if(!url){toast('أدخل رابط M3U','err');return;}
    document.getElementById('impSt').textContent='جاري التحميل...';
    document.getElementById('impSt').className='imp-st';
    fetch(url).then(function(r){return r.text();}).then(function(t){
      var c=parseM3U(t);
      if(!c.length){setImpSt('لم يُعثر على قنوات','err');return;}
      CHS=CHS.concat(c);saveChs();render();setImpSt('✓ تم استيراد '+c.length+' قناة','ok');updateStats();
    }).catch(function(e){setImpSt('خطأ: '+e.message,'err');});
  }

  function importFromText(){
    var t=document.getElementById('m3uText').value.trim();
    if(!t){toast('الصق M3U','err');return;}
    var c=parseM3U(t);
    if(!c.length){setImpSt('لم يُعثر على قنوات','err');return;}
    CHS=CHS.concat(c);saveChs();render();setImpSt('✓ تم استيراد '+c.length+' قناة','ok');
    document.getElementById('m3uText').value='';updateStats();
  }

  function setImpSt(m,tp){var s=document.getElementById('impSt');s.textContent=m;s.className='imp-st '+(tp||'');setTimeout(function(){s.className='imp-st';},5000);}

  // ─── Backup ───
  function exportBackup(){
    var j=JSON.stringify({version:2,date:new Date().toISOString(),channels:CHS},null,2);
    var b=new Blob([j],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='mus-backup-'+Date.now()+'.json';a.click();
    toast('✓ تم التصدير','ok');
  }

  function importBackup(inp){
    var f=inp.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(e){
      try{var d=JSON.parse(e.target.result);var c=d.channels||d;if(!Array.isArray(c))throw new Error('تنسيق غير صحيح');CHS=c;saveChs();render();renderAdminList();updateStats();toast('✓ تمت الاستعادة ('+c.length+' قناة)','ok');}
      catch(ex){toast('خطأ: '+ex.message,'err');}
    };
    r.readAsText(f);inp.value='';
  }

  function importFromJson(){
    var t=document.getElementById('jsonArea').value.trim();if(!t){toast('الصق JSON','err');return;}
    try{var d=JSON.parse(t);var c=d.channels||d;if(!Array.isArray(c))throw new Error('تنسيق غير صحيح');CHS=c;saveChs();render();renderAdminList();toast('✓ تمت الاستعادة ('+c.length+' قناة)','ok');}
    catch(ex){toast('خطأ: '+ex.message,'err');}
  }

  // ═══════════════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════════════
  resetForm();
  showOverlayIdle(null,'MUS Player','اختر قناة للبدء');
  render();
  if(window.innerWidth>=1024)document.getElementById('sidebar').classList.remove('closed');

  // Register service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
  </script>
  </body>
  </html>
