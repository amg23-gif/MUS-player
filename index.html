<!DOCTYPE html>
  <html lang="ar" dir="rtl">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080a10">
  <title>MUS Player</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <style>
  :root{--bg:#080a10;--bg2:#0f1120;--bg3:#181b2a;--acc:#e62020;--text:#eef0f8;--muted:#7880a0;--border:#1e2235;--green:#22c55e;--radius:9px}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:Tahoma,'Segoe UI',Arial,sans-serif;overflow:hidden;user-select:none}

  /* ── Header ── */
  .hdr{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);height:50px;position:relative;z-index:50}
  .logo{display:flex;align-items:center;gap:7px;margin-right:auto;flex-shrink:0}
  .logo-ic{width:32px;height:32px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900}
  .logo-t1{font-size:12px;font-weight:700;line-height:1.2}
  .logo-t2{font-size:9px;color:var(--acc);letter-spacing:1.5px}
  .sw{flex:1;max-width:300px;display:flex;align-items:center;background:var(--bg3);border-radius:8px;border:1px solid var(--border);overflow:hidden;min-width:0}
  .sw input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px;padding:7px 10px;min-width:0;direction:rtl}
  .sw input::placeholder{color:var(--muted)}
  .ibtn{width:36px;height:36px;min-width:36px;background:none;border:none;color:var(--text);cursor:pointer;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:background .12s}
  .ibtn:hover,.ibtn.on{background:var(--bg3)}

  /* ── Layout ── */
  .layout{display:flex;height:calc(100dvh - 50px);overflow:hidden}

  /* ── Sidebar ── */
  .sidebar{width:210px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .2s}
  .sidebar.closed{width:0;border:none}
  .cats{display:flex;flex-wrap:wrap;gap:4px;padding:8px;border-bottom:1px solid var(--border)}
  .cat{padding:4px 9px;border-radius:20px;font-size:11px;cursor:pointer;background:var(--bg3);color:var(--muted);border:1px solid transparent;white-space:nowrap;transition:.1s}
  .cat.on{background:var(--acc);color:#fff}.cat:hover:not(.on){border-color:var(--acc);color:var(--text)}
  .chlist{flex:1;overflow-y:auto;padding:4px}.chlist::-webkit-scrollbar{width:3px}.chlist::-webkit-scrollbar-thumb{background:var(--bg3)}
  .chi{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:7px;cursor:pointer;margin-bottom:2px;position:relative;border-right:3px solid transparent;transition:.1s}
  .chi:hover,.chi.on{background:var(--bg3)}.chi.on{border-right-color:var(--acc)}
  .chi:focus{outline:2px solid var(--acc);outline-offset:-2px}
  .chi-logo{width:32px;height:22px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--bg);border-radius:4px;overflow:hidden}
  .chi-logo img{width:100%;height:100%;object-fit:contain}
  .chi-n{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .chi-del{font-size:13px;padding:2px 4px;color:var(--muted);cursor:pointer;flex-shrink:0;border-radius:4px;opacity:0;transition:opacity .1s}
  .chi:hover .chi-del{opacity:1}.chi-del:hover{color:#ff4444;background:rgba(255,40,40,.1)}

  /* ── Main ── */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

  /* ── Player ── */
  .pw{position:relative;width:100%;background:#000;flex-shrink:0}
  .pw video{width:100%;height:100%;display:block;background:#000;object-fit:contain;outline:none}

  /* Normal sizing */
  .pw{height:52vw;max-height:58vh}
  @media(min-width:900px){.pw{height:40vh;max-height:52vh}}

  /* ── CSS FULLSCREEN (WebView-safe) ── */
  .pw.fs{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;max-height:none!important;z-index:900!important;background:#000!important}
  body.has-fs .layout{pointer-events:none}
  body.has-fs .pw.fs{pointer-events:all}
  .pw.fs .ctrl{opacity:1!important;pointer-events:all!important}

  /* ── Overlay ── */
  .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(4,5,12,.93);z-index:10;gap:9px;text-align:center;padding:14px;transition:opacity .2s}
  .ov.gone{opacity:0;pointer-events:none}
  .spin{width:36px;height:36px;border:3px solid var(--bg3);border-top-color:var(--acc);border-radius:50%;animation:sp .65s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .ov-ic{font-size:44px}
  .ov-t{font-size:16px;font-weight:700}.ov-s{font-size:12px;color:var(--muted);max-width:240px;line-height:1.5}

  /* ── Controls ── */
  .ctrl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));padding:30px 10px 8px;display:flex;align-items:center;gap:6px;z-index:20;opacity:0;pointer-events:none;transition:opacity .25s}
  .ctrl.show{opacity:1;pointer-events:all}
  .ctrl-title{flex:1;font-size:12px;font-weight:600;text-shadow:0 1px 4px #000;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .cb{background:rgba(255,255,255,.12);border:none;color:#fff;font-size:18px;cursor:pointer;padding:6px 10px;border-radius:6px;line-height:1;flex-shrink:0;transition:background .12s}
  .cb:hover,.cb:focus{background:rgba(230,32,32,.7);outline:none}
  .vw{display:flex;align-items:center;gap:3px;flex-shrink:0}
  .vs{width:62px;accent-color:var(--acc);cursor:pointer}

  /* ── Grid ── */
  .ga{flex:1;overflow-y:auto;padding:10px}.ga::-webkit-scrollbar{width:5px}.ga::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px}
  .gc{border-radius:var(--radius);background:var(--bg2);border:2px solid var(--border);cursor:pointer;padding:9px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;transition:border .1s,transform .1s;position:relative}
  .gc:hover{border-color:var(--acc);transform:translateY(-1px)}
  .gc:focus{border-color:var(--acc);outline:none;box-shadow:0 0 0 3px rgba(230,32,32,.4);transform:translateY(-1px)}
  .gc.on{border-color:var(--acc);background:var(--bg3)}
  .gc-logo{width:48px;height:32px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .gc-logo img{width:100%;height:100%;object-fit:contain;border-radius:3px}
  .gc-name{font-size:11px;font-weight:600;line-height:1.3;word-break:break-word}
  .gc-cat{font-size:10px;color:var(--muted)}
  /* Delete X on card */
  .gc-del{position:absolute;top:4px;left:4px;width:20px;height:20px;background:rgba(230,32,32,.85);color:#fff;border-radius:50%;font-size:12px;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1;border:none;z-index:5}
  .gc:hover .gc-del,.gc:focus .gc-del{display:flex}
  .gc-del:hover{background:var(--acc)}
  .ge{grid-column:1/-1;text-align:center;color:var(--muted);padding:30px;font-size:13px}

  /* ── Admin ── */
  .abg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:16px}
  .abg.open{display:block}
  .abox{background:var(--bg2);border:1px solid var(--border);border-radius:12px;max-width:560px;margin:auto;padding:18px}
  .ahdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .ahdr h2{font-size:15px}.ac{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px}
  .tip{font-size:11px;color:var(--muted);background:rgba(230,32,32,.07);border-right:3px solid var(--acc);border-radius:6px;padding:7px 10px;margin-bottom:12px;line-height:1.6}
  .f{margin-bottom:10px}.f label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
  .f input,.f select,.f textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;transition:border .12s;font-family:inherit}
  .f input:focus,.f select:focus,.f textarea:focus{border-color:var(--acc)}
  .f textarea{resize:none;height:56px;font-size:11px;direction:ltr;font-family:monospace}
  .frow{display:flex;gap:8px;flex-wrap:wrap}.frow .f{flex:1;min-width:90px}
  .sep{border:none;border-top:1px solid var(--border);margin:12px 0}
  .ab{padding:8px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .12s}
  .ab:hover{opacity:.82}.ab.p{background:var(--acc);color:#fff}.ab.s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.ab.d{background:#4a0808;color:#ff8a8a}
  .ab-row{display:flex;gap:8px;flex-wrap:wrap}
  /* Channel list in admin */
  .chmgr{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:7px;background:var(--bg3)}
  .chmgr::-webkit-scrollbar{width:3px}.chmgr::-webkit-scrollbar-thumb{background:var(--bg)}
  .cmr{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid var(--border)}
  .cmr:last-child{border:none}.cmr-n{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cmr-cat{font-size:10px;color:var(--muted);margin-left:4px}
  .cmr-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:3px 5px;border-radius:4px}
  .cmr-btn.e{color:var(--muted)}.cmr-btn.e:hover{color:var(--text);background:var(--bg2)}
  .cmr-btn.d{color:#ff6060}.cmr-btn.d:hover{background:rgba(255,40,40,.1)}
  #admSt{margin-top:9px;font-size:12px;color:var(--muted);min-height:18px}

  /* ── Edit modal ── */
  .emod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:center;justify-content:center;padding:16px}
  .emod.open{display:flex}
  .ebox{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:460px;padding:18px}
  .ehdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .ehdr h3{font-size:14px}

  /* ── Toast ── */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2030;border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:8px;font-size:13px;z-index:1000;animation:tf 2.8s forwards;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
  @keyframes tf{0%{opacity:0;transform:translateX(-50%) translateY(8px)}10%{opacity:1;transform:translateX(-50%)}80%{opacity:1}100%{opacity:0}}

  /* ── Mobile ── */
  @media(max-width:600px){
    .layout{flex-direction:column}
    .sidebar{width:100%;border-left:none;border-bottom:1px solid var(--border);max-height:180px;transition:max-height .2s}
    .sidebar.closed{max-height:0;border:none}
    .pw{height:48vw;max-height:none}
    .grid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px}
    .logo-t1,.logo-t2{display:none}
    .vs{width:48px}
  }

  /* ── TV ── */
  @media(min-width:1024px){
    .pw{height:55vh;max-height:62vh}
    .gc{min-height:78px}.gc-name{font-size:13px}
    .cb{font-size:22px;padding:8px 14px}
    .ctrl-title{font-size:14px}
    .chi-n{font-size:13px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:10px}
  }

  /* Focus ring for TV */
  :focus-visible{outline:2px solid var(--acc);outline-offset:2px}
  </style>
  </head>
  <body>

  <div class="hdr">
    <button class="ibtn" id="btnMenu">☰</button>
    <button class="ibtn" id="btnFav">☆</button>
    <div class="sw">
      <span style="color:var(--muted);padding-right:2px;font-size:14px">🔍</span>
      <input id="sq" type="text" placeholder="بحث..." autocomplete="off" spellcheck="false">
    </div>
    <div class="logo">
      <div class="logo-ic">▶</div>
      <div><div class="logo-t1">MUS Player</div><div class="logo-t2">LIVE TV</div></div>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar closed" id="sidebar">
      <div class="cats" id="cats"></div>
      <div class="chlist" id="chlist"></div>
    </div>

    <div class="main">
      <div class="pw" id="pw">
        <video id="vid" playsinline preload="none"></video>

        <div class="ov" id="ov">
          <div class="spin" id="spin" style="display:none"></div>
          <div class="ov-ic" id="ovIc">▶</div>
          <div class="ov-t" id="ovT">MUS Player</div>
          <div class="ov-s" id="ovS">اختر قناة للبدء</div>
        </div>

        <div class="ctrl" id="ctrl">
          <button class="cb" id="cbPrev">⏮</button>
          <button class="cb" id="cbPlay">⏸</button>
          <button class="cb" id="cbNext">⏭</button>
          <div class="ctrl-title" id="ctrlT">—</div>
          <div class="vw">
            <button class="cb" id="cbMute">🔊</button>
            <input class="vs" id="volSl" type="range" min="0" max="1" step="0.05" value="1">
          </div>
          <button class="cb" id="cbFs" title="ملء الشاشة">⛶</button>
        </div>
      </div>

      <div class="ga" id="ga">
        <div class="grid" id="grid"></div>
      </div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="abg" id="admBg">
  <div class="abox">
    <div class="ahdr">
      <h2>⚙️ لوحة التحكم</h2>
      <button class="ac" id="admClose">✕</button>
    </div>

    <div class="tip">💡 أدخل كلمة المرور في خانة البحث للدخول</div>

    <!-- M3U -->
    <div class="f">
      <label>رابط M3U / m3u_plus</label>
      <input id="m3uUrl" type="url" placeholder="http://server/get.php?username=...&amp;type=m3u_plus" dir="ltr">
    </div>
    <div class="ab-row" style="margin-bottom:10px">
      <button class="ab p" id="btnM3u" style="flex:1">📥 استيراد M3U</button>
    </div>

    <hr class="sep">
    <!-- Xtream -->
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Xtream Codes:</div>
    <div class="frow">
      <div class="f"><label>السيرفر</label><input id="xcSrv" placeholder="http://server:8080" dir="ltr"></div>
      <div class="f"><label>المستخدم</label><input id="xcU" dir="ltr"></div>
      <div class="f"><label>كلمة المرور</label><input id="xcP" dir="ltr"></div>
    </div>
    <button class="ab p" id="btnXc" style="margin-bottom:10px">🔗 استيراد Xtream</button>

    <hr class="sep">
    <!-- Add channel -->
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">إضافة قناة يدوياً:</div>
    <div class="frow">
      <div class="f"><label>الاسم</label><input id="aN"></div>
      <div class="f"><label>التصنيف</label><input id="aCat" value="عام"></div>
    </div>
    <div class="f"><label>رابط البث (.m3u8)</label><input id="aUrl" dir="ltr"></div>
    <div class="f"><label>شعار (اختياري)</label><input id="aLogo" dir="ltr"></div>
    <button class="ab p" id="btnAdd">➕ إضافة</button>

    <hr class="sep">
    <!-- Manage channels -->
    <div style="font-size:11px;color:var(--text);font-weight:600;margin-bottom:8px">📋 إدارة القنوات (<span id="chCount">0</span>)</div>
    <div class="chmgr" id="chmgr"></div>

    <hr class="sep">
    <!-- Sync -->
    <div style="font-size:11px;color:var(--text);font-weight:600;margin-bottom:8px">📲 مزامنة بين الأجهزة</div>
    <div class="ab-row">
      <button class="ab s" id="btnSyncExp" style="flex:1">📤 نسخ رمز المزامنة</button>
      <button class="ab s" id="btnSyncImpShow" style="flex:1">📥 استيراد رمز</button>
    </div>
    <div class="f" id="syncImpWrap" style="display:none;margin-top:8px">
      <label>الصق رمز المزامنة</label>
      <textarea id="syncIn" placeholder="الصق الرمز هنا..."></textarea>
      <button class="ab p" style="width:100%;margin-top:6px" id="btnSyncDo">✓ تطبيق</button>
    </div>

    <hr class="sep">
    <div class="ab-row">
      <button class="ab s" id="btnExp">💾 تصدير JSON</button>
      <button class="ab d" id="btnClr">🗑️ مسح الكل</button>
    </div>
    <div id="admSt"></div>
  </div>
  </div>

  <!-- Edit modal -->
  <div class="emod" id="editMod">
  <div class="ebox">
    <div class="ehdr">
      <h3>✏️ تعديل القناة</h3>
      <button class="ac" id="editClose">✕</button>
    </div>
    <div class="frow">
      <div class="f"><label>الاسم</label><input id="eN"></div>
      <div class="f"><label>التصنيف</label><input id="eCat"></div>
    </div>
    <div class="f"><label>رابط البث</label><input id="eUrl" dir="ltr"></div>
    <div class="f"><label>رابط الشعار</label><input id="eLogo" dir="ltr"></div>
    <input type="hidden" id="eId">
    <div class="ab-row" style="margin-top:4px">
      <button class="ab p" id="editSave" style="flex:1">✓ حفظ</button>
      <button class="ab s" id="editClose2" style="flex:1">إلغاء</button>
    </div>
  </div>
  </div>

  <script>
  var TRIG='bouchta', KEY='mus_v2', FKEY='mus_fav';
  function lget(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
  function lset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function nid(){return Date.now()+'-'+Math.random().toString(36).slice(2,5);}

  function defChs(){return[
    {id:'d1',name:'بث تجريبي',url:'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8',cat:'تجريبي',logo:''},
    {id:'d2',name:'Big Buck Bunny',url:'https://devstreaming-cdn.apple.com/videos/streaming/examples/bipbop_4x3/bipbop_4x3_variant.m3u8',cat:'تجريبي',logo:''}
  ];}

  var CHS=(function(){var a=lget(KEY,null);return(Array.isArray(a)&&a.length)?a:defChs();})();
  var FAVS=lget(FKEY,[]);
  var curId=null,aCat='الكل',sq_v='',favOnly=false,hls=null,ctrlTimer=null;

  var vid=document.getElementById('vid');
  var ov=document.getElementById('ov');
  var ctrl=document.getElementById('ctrl');
  var pw=document.getElementById('pw');

  /* ── Overlay ── */
  function showOv(loading,ic,t,s){
    document.getElementById('spin').style.display=loading?'block':'none';
    document.getElementById('ovIc').style.display=loading?'none':'block';
    document.getElementById('ovIc').textContent=ic||'▶';
    document.getElementById('ovT').textContent=t||'MUS Player';
    document.getElementById('ovS').textContent=s||'';
    ov.classList.remove('gone'); ctrl.classList.remove('show');
  }
  function hideOv(){ov.classList.add('gone');ctrl.classList.add('show');showCtrlTemp();}

  /* ── Controls visibility ── */
  function showCtrlTemp(){
    ctrl.classList.add('show');
    clearTimeout(ctrlTimer);
    if(!vid.paused) ctrlTimer=setTimeout(function(){ctrl.classList.remove('show');},4000);
  }

  /* ── CSS Fullscreen (WebView-safe) ── */
  var isFs=false;
  function setFs(on){
    isFs=on;
    pw.classList.toggle('fs',on);
    document.body.classList.toggle('has-fs',on);
    document.getElementById('cbFs').textContent=on?'✕ خروج':'⛶';
    if(on){
      // Try native too (works on some devices)
      var fn=pw.requestFullscreen||pw.webkitRequestFullscreen||vid.requestFullscreen||vid.webkitRequestFullscreen;
      if(fn) fn.call(pw).catch(function(){});
    } else {
      if(document.fullscreenElement||document.webkitFullscreenElement){
        (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);
      }
    }
    showCtrlTemp();
  }
  document.getElementById('cbFs').onclick=function(){setFs(!isFs);};
  document.addEventListener('fullscreenchange',function(){if(!document.fullscreenElement){pw.classList.remove('fs');document.body.classList.remove('has-fs');isFs=false;document.getElementById('cbFs').textContent='⛶';}});
  document.addEventListener('webkitfullscreenchange',function(){if(!document.webkitFullscreenElement){pw.classList.remove('fs');document.body.classList.remove('has-fs');isFs=false;document.getElementById('cbFs').textContent='⛶';}});

  /* double tap = toggle fullscreen */
  var lastTap=0;
  pw.addEventListener('click',function(e){
    if(ctrl.contains(e.target)) return;
    var now=Date.now();
    if(now-lastTap<300){setFs(!isFs);}
    else{showCtrlTemp();}
    lastTap=now;
  });

  /* ── HLS / stream ── */
  function killHls(){if(hls){try{hls.destroy();}catch(e){}hls=null;}vid.pause();vid.removeAttribute('src');vid.load();}

  function loadStream(url,ch){
    killHls();
    document.getElementById('ctrlT').textContent=ch?ch.name:'—';
    showOv(true,'📺',ch?ch.name:'جاري التحميل...','تحميل البث...');
    var isHlsUrl=url.indexOf('.m3u8')>-1||url.indexOf('/live/')>-1||url.indexOf('/hls/')>-1;
    if(isHlsUrl&&window.Hls&&Hls.isSupported()){startHls(url,ch);}
    else{startNative(url,ch,function(){if(isHlsUrl&&window.Hls&&Hls.isSupported())startHls(url,ch);else showOv(false,'⚠️',ch?ch.name:'خطأ','تعذّر تشغيل البث');});}
  }

  function startHls(url,ch){
    hls=new Hls({
      enableWorker:false,
      maxBufferLength:6,
      maxMaxBufferLength:12,
      maxBufferSize:8*1000*1000,
      maxBufferHole:0.3,
      startPosition:-1,
      lowLatencyMode:true,
      backBufferLength:5,
      fragLoadingTimeOut:8000,
      manifestLoadingTimeOut:8000,
      levelLoadingTimeOut:8000,
      fragLoadingMaxRetry:4,
      manifestLoadingMaxRetry:3,
      levelLoadingMaxRetry:3,
      fragLoadingRetryDelay:800,
      nudgeMaxRetry:5,
      highBufferWatchdogPeriod:2
    });
    hls.loadSource(url);
    hls.attachMedia(vid);
    var ok=false;
    hls.once(Hls.Events.MANIFEST_PARSED,function(){ok=true;hideOv();vid.play().catch(function(){});});
    hls.on(Hls.Events.ERROR,function(e,d){
      if(d.fatal){
        if(d.type===Hls.ErrorTypes.NETWORK_ERROR&&!ok){
          setTimeout(function(){hls&&hls.startLoad();},2000);
        } else {
          killHls();
          showOv(false,'⚠️',ch?ch.name:'خطأ','فشل البث — تحقق من الرابط');
        }
      }
    });
  }

  function startNative(url,ch,onFail){
    vid.src=url;vid.load();
    var done=false,t=setTimeout(function(){if(!done){done=true;onFail&&onFail();}},10000);
    vid.oncanplay=function(){if(done)return;done=true;clearTimeout(t);vid.oncanplay=vid.onerror=null;hideOv();vid.play().catch(function(){});};
    vid.onerror=function(){if(done)return;done=true;clearTimeout(t);vid.oncanplay=vid.onerror=null;onFail&&onFail();};
  }

  /* ── Controls ── */
  document.getElementById('cbPlay').onclick=function(){vid.paused?vid.play():vid.pause();};
  vid.addEventListener('play',function(){document.getElementById('cbPlay').textContent='⏸';showCtrlTemp();});
  vid.addEventListener('pause',function(){document.getElementById('cbPlay').textContent='▶';ctrl.classList.add('show');clearTimeout(ctrlTimer);});
  document.getElementById('cbMute').onclick=function(){vid.muted=!vid.muted;this.textContent=vid.muted?'🔇':'🔊';document.getElementById('volSl').value=vid.muted?0:vid.volume;};
  document.getElementById('volSl').oninput=function(){vid.volume=parseFloat(this.value);vid.muted=vid.volume===0;document.getElementById('cbMute').textContent=vid.muted?'🔇':'🔊';};
  document.getElementById('cbPrev').onclick=function(){var l=getList(),i=l.findIndex(function(c){return c.id===curId;});if(i>0)playCh(l[i-1].id);};
  document.getElementById('cbNext').onclick=function(){var l=getList(),i=l.findIndex(function(c){return c.id===curId;});if(i>=0&&i<l.length-1)playCh(l[i+1].id);};

  /* ── Play channel ── */
  function playCh(id){
    var ch=CHS.find(function(c){return c.id===id;});if(!ch)return;
    curId=id;loadStream(ch.url,ch);render();
  }

  /* ── Delete channel ── */
  function delCh(id){
    var idx=CHS.findIndex(function(c){return c.id===id;});if(idx<0)return;
    var name=CHS[idx].name;
    if(!confirm('حذف "'+name+'"؟'))return;
    CHS.splice(idx,1);lset(KEY,CHS);
    if(curId===id){curId=null;killHls();showOv(false,'▶','MUS Player','اختر قناة للبدء');}
    render();renderChmgr();toast('✓ تم حذف "'+name+'"');
  }

  /* ── Toggle fav ── */
  function togFav(id){var i=FAVS.indexOf(id);if(i>-1)FAVS.splice(i,1);else FAVS.push(id);lset(FKEY,FAVS);render();}

  /* ── Filter ── */
  function getList(){
    var l=CHS.slice();
    if(favOnly)l=l.filter(function(c){return FAVS.indexOf(c.id)>-1;});
    if(aCat!=='الكل')l=l.filter(function(c){return c.cat===aCat;});
    if(sq_v)l=l.filter(function(c){return(c.name+' '+(c.cat||'')).toLowerCase().indexOf(sq_v)>-1;});
    return l;
  }

  /* ── Render ── */
  function mkLogo(logo,big){
    if(logo&&logo.trim())return'<img src="'+esc(logo)+'" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:contain">';
    return big?'<span style="font-size:22px">📺</span>':'📺';
  }
  function render(){
    var list=getList();
    var cats=['الكل'];CHS.forEach(function(c){if(c.cat&&cats.indexOf(c.cat)<0)cats.push(c.cat);});
    document.getElementById('cats').innerHTML=cats.map(function(c){return'<div class="cat'+(aCat===c?' on':'')+'" data-cat="'+esc(c)+'" tabindex="0">'+esc(c)+'</div>';}).join('');
    if(!list.length){
      document.getElementById('chlist').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80px;color:var(--muted);font-size:12px;gap:6px"><div>📭</div><div>لا توجد قنوات</div></div>';
      document.getElementById('grid').innerHTML='<div class="ge">لا توجد نتائج</div>';
    } else {
      document.getElementById('chlist').innerHTML=list.map(function(c){
        var on=c.id===curId,fav=FAVS.indexOf(c.id)>-1;
        return'<div class="chi'+(on?' on':'')+'" data-cid="'+esc(c.id)+'" tabindex="0">'
          +'<div class="chi-logo">'+mkLogo(c.logo,false)+'</div>'
          +'<div class="chi-n">'+esc(c.name)+'</div>'
          +'<span class="chi-del" data-del="'+esc(c.id)+'">✕</span>'
          +'</div>';
      }).join('');
      document.getElementById('grid').innerHTML=list.map(function(c){
        var on=c.id===curId;
        return'<div class="gc'+(on?' on':'')+'" data-cid="'+esc(c.id)+'" tabindex="0">'
          +'<button class="gc-del" data-del="'+esc(c.id)+'">✕</button>'
          +'<div class="gc-logo">'+mkLogo(c.logo,true)+'</div>'
          +'<div class="gc-name">'+esc(c.name)+'</div>'
          +'<div class="gc-cat">'+esc(c.cat||'')+'</div>'
          +'</div>';
      }).join('');
    }
    document.getElementById('btnFav').textContent=favOnly?'★':'☆';
    document.getElementById('btnFav').className='ibtn'+(favOnly?' on':'');
  }

  /* ── Event delegation ── */
  document.getElementById('cats').addEventListener('click',function(e){var t=e.target.closest('[data-cat]');if(t){aCat=t.dataset.cat;render();}});
  document.getElementById('cats').addEventListener('keydown',function(e){if(e.key==='Enter'){var t=e.target.closest('[data-cat]');if(t){aCat=t.dataset.cat;render();}}});
  document.getElementById('chlist').addEventListener('click',function(e){
    var d=e.target.closest('[data-del]');if(d){e.stopPropagation();delCh(d.dataset.del);return;}
    var t=e.target.closest('[data-cid]');if(t)playCh(t.dataset.cid);
  });
  document.getElementById('chlist').addEventListener('keydown',function(e){if(e.key==='Enter'){var t=e.target.closest('[data-cid]');if(t)playCh(t.dataset.cid);}});
  document.getElementById('grid').addEventListener('click',function(e){
    var d=e.target.closest('[data-del]');if(d){e.stopPropagation();delCh(d.dataset.del);return;}
    var t=e.target.closest('[data-cid]');if(t)playCh(t.dataset.cid);
  });

  /* ── Search ── */
  var sqEl=document.getElementById('sq');
  sqEl.addEventListener('input',function(){
    if(this.value===TRIG){this.value='';openAdm();return;}
    sq_v=this.value.toLowerCase().trim();render();
  });
  sqEl.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();this.blur();}});
  document.getElementById('btnMenu').onclick=function(){document.getElementById('sidebar').classList.toggle('closed');};
  document.getElementById('btnFav').onclick=function(){favOnly=!favOnly;render();};

  /* ── TV D-pad navigation ── */
  function gridItems(){return Array.from(document.getElementById('grid').querySelectorAll('.gc'));}
  function gridCols(){
    var items=gridItems();if(items.length<2)return 1;
    var y0=items[0].getBoundingClientRect().top,cols=0;
    for(var i=0;i<items.length;i++){if(Math.abs(items[i].getBoundingClientRect().top-y0)<5)cols++;else break;}
    return cols||1;
  }
  function focusGc(idx){
    var items=gridItems();if(!items.length)return;
    idx=Math.max(0,Math.min(idx,items.length-1));
    items[idx].focus();items[idx].scrollIntoView({block:'nearest',behavior:'smooth'});
  }
  function curGcIdx(){var items=gridItems(),f=document.activeElement;return items.indexOf(f);}

  document.addEventListener('keydown',function(e){
    var admOpen=document.getElementById('admBg').classList.contains('open');
    var modOpen=document.getElementById('editMod').classList.contains('open');
    if(admOpen||modOpen){if(e.key==='Escape'){closeAdm();closeEdit();}return;}
    var inSq=document.activeElement===sqEl;
    var k=e.key;
    if(k==='VolumeUp'||k==='AudioVolumeUp'){e.preventDefault();vid.volume=Math.min(1,vid.volume+0.1);document.getElementById('volSl').value=vid.volume;return;}
    if(k==='VolumeDown'||k==='AudioVolumeDown'){e.preventDefault();vid.volume=Math.max(0,vid.volume-0.1);document.getElementById('volSl').value=vid.volume;return;}
    if(k==='MediaPlayPause'){vid.paused?vid.play():vid.pause();return;}
    if(k==='Escape'){if(isFs){setFs(false);}return;}
    if(k==='Backspace'&&isFs){setFs(false);return;}
    if(inSq)return;
    if(k===' '&&vid.src&&!document.activeElement.classList.contains('gc')){e.preventDefault();vid.paused?vid.play():vid.pause();return;}
    if(k==='ArrowDown'||k==='ArrowUp'||k==='ArrowLeft'||k==='ArrowRight'){
      e.preventDefault();
      var cols=gridCols(),idx=curGcIdx();
      if(idx===-1)idx=0;
      else if(k==='ArrowDown')idx+=cols;
      else if(k==='ArrowUp')idx-=cols;
      else if(k==='ArrowLeft')idx+=1;
      else if(k==='ArrowRight')idx-=1;
      focusGc(idx);return;
    }
    if((k==='Enter'||k==='OK')&&document.activeElement.classList.contains('gc')){e.preventDefault();playCh(document.activeElement.dataset.cid);return;}
  });

  /* ── Toast ── */
  function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.parentNode&&t.parentNode.removeChild(t);},2800);}

  /* ── Admin ── */
  function setSt(msg,ok){var el=document.getElementById('admSt');el.textContent=msg;el.style.color=ok?'var(--green)':'var(--muted)';}
  function openAdm(){document.getElementById('admBg').classList.add('open');renderChmgr();setSt('');}
  function closeAdm(){document.getElementById('admBg').classList.remove('open');}
  document.getElementById('admClose').onclick=closeAdm;
  document.getElementById('admBg').addEventListener('click',function(e){if(e.target===this)closeAdm();});

  /* Channel manager list in admin */
  function renderChmgr(){
    document.getElementById('chCount').textContent=CHS.length;
    if(!CHS.length){document.getElementById('chmgr').innerHTML='<div style="padding:12px;font-size:12px;color:var(--muted);text-align:center">لا توجد قنوات</div>';return;}
    document.getElementById('chmgr').innerHTML=CHS.map(function(c){
      return'<div class="cmr">'
        +'<div class="cmr-n">'+esc(c.name)+'<span class="cmr-cat">'+esc(c.cat||'')+'</span></div>'
        +'<button class="cmr-btn e" data-edit="'+esc(c.id)+'" title="تعديل">✏️</button>'
        +'<button class="cmr-btn d" data-del2="'+esc(c.id)+'" title="حذف">🗑️</button>'
        +'</div>';
    }).join('');
  }
  document.getElementById('chmgr').addEventListener('click',function(e){
    var ed=e.target.closest('[data-edit]');if(ed){openEdit(ed.dataset.edit);return;}
    var dl=e.target.closest('[data-del2]');if(dl){delCh(dl.dataset.del2);renderChmgr();return;}
  });

  /* ── Edit modal ── */
  function openEdit(id){
    var ch=CHS.find(function(c){return c.id===id;});if(!ch)return;
    document.getElementById('eN').value=ch.name||'';
    document.getElementById('eCat').value=ch.cat||'';
    document.getElementById('eUrl').value=ch.url||'';
    document.getElementById('eLogo').value=ch.logo||'';
    document.getElementById('eId').value=ch.id;
    document.getElementById('editMod').classList.add('open');
  }
  function closeEdit(){document.getElementById('editMod').classList.remove('open');}
  document.getElementById('editClose').onclick=closeEdit;
  document.getElementById('editClose2').onclick=closeEdit;
  document.getElementById('editMod').addEventListener('click',function(e){if(e.target===this)closeEdit();});
  document.getElementById('editSave').onclick=function(){
    var id=document.getElementById('eId').value;
    var ch=CHS.find(function(c){return c.id===id;});if(!ch)return;
    ch.name=document.getElementById('eN').value.trim()||ch.name;
    ch.cat=document.getElementById('eCat').value.trim()||ch.cat;
    ch.url=document.getElementById('eUrl').value.trim()||ch.url;
    ch.logo=document.getElementById('eLogo').value.trim();
    lset(KEY,CHS);render();renderChmgr();closeEdit();toast('✓ تم الحفظ');
  };

  /* ── Add channel ── */
  document.getElementById('btnAdd').onclick=function(){
    var n=document.getElementById('aN').value.trim(),u=document.getElementById('aUrl').value.trim(),cat=document.getElementById('aCat').value.trim()||'عام',logo=document.getElementById('aLogo').value.trim();
    if(!n||!u){setSt('أدخل الاسم والرابط');return;}
    CHS.push({id:nid(),name:n,url:u,cat:cat,logo:logo});lset(KEY,CHS);
    document.getElementById('aN').value='';document.getElementById('aUrl').value='';document.getElementById('aLogo').value='';
    aCat='الكل';render();renderChmgr();setSt('✓ تمت الإضافة',true);toast('✓ القناة أُضيفت');
  };

  /* ── M3U parser ── */
  function parseM3u(text){
    var lines=text.split('\n'),out=[],cur=null;
    lines.forEach(function(line){
      line=line.trim();
      if(line.startsWith('#EXTINF')){
        cur={id:nid(),name:'',url:'',cat:'عام',logo:''};
        var nm=line.match(/,(.+)$/);if(nm)cur.name=nm[1].trim();
        var lg=line.match(/tvg-logo="([^"]*)"/);if(lg)cur.logo=lg[1];
        var ct=line.match(/group-title="([^"]*)"/);if(ct)cur.cat=ct[1]||'عام';
      }else if(line&&!line.startsWith('#')&&cur){cur.url=line;out.push(cur);cur=null;}
    });
    return out;
  }
  function fetchM3u(url){
    return fetch(url).catch(function(){return fetch('https://corsproxy.io/?'+encodeURIComponent(url));});
  }

  document.getElementById('btnM3u').onclick=function(){
    var url=document.getElementById('m3uUrl').value.trim();if(!url){setSt('أدخل رابط M3U');return;}
    setSt('⏳ جاري الاستيراد...');
    fetchM3u(url).then(function(r){return r.text();}).then(function(text){
      var chs=parseM3u(text);if(!chs.length){setSt('لم تُعثر على قنوات');return;}
      CHS=chs;lset(KEY,CHS);aCat='الكل';render();renderChmgr();setSt('✓ '+chs.length+' قناة',true);toast('✓ '+chs.length+' قناة');closeAdm();
    }).catch(function(e){setSt('خطأ: '+e.message);});
  };

  document.getElementById('btnXc').onclick=function(){
    var srv=document.getElementById('xcSrv').value.trim().replace(/\/$/,''),u=document.getElementById('xcU').value.trim(),p=document.getElementById('xcP').value.trim();
    if(!srv||!u||!p){setSt('أدخل السيرفر والبيانات');return;}
    var url=srv+'/get.php?username='+encodeURIComponent(u)+'&password='+encodeURIComponent(p)+'&type=m3u_plus&output=ts';
    setSt('⏳ جاري الاستيراد...');
    fetchM3u(url).then(function(r){return r.text();}).then(function(text){
      if(!text.includes('#EXTINF'))throw new Error('استجابة غير صالحة');
      var chs=parseM3u(text);if(!chs.length)throw new Error('لا قنوات');
      CHS=chs;lset(KEY,CHS);aCat='الكل';render();renderChmgr();setSt('✓ '+chs.length+' قناة',true);toast('✓ '+chs.length+' قناة');closeAdm();
    }).catch(function(e){setSt('خطأ: '+e.message);});
  };

  /* ── Sync ── */
  function getCode(){try{return btoa(unescape(encodeURIComponent(JSON.stringify(CHS))));}catch(e){return'';}}
  function applyCode(code){
    try{code=code.trim().replace(/\s+/g,'');var j=decodeURIComponent(escape(atob(code)));var a=JSON.parse(j);if(!Array.isArray(a)||!a.length)throw new Error();return a;}
    catch(e){return null;}
  }
  document.getElementById('btnSyncExp').onclick=function(){
    var code=getCode();if(!code){toast('لا توجد قنوات');return;}
    if(navigator.clipboard){navigator.clipboard.writeText(code).then(function(){toast('✓ تم نسخ رمز المزامنة ('+CHS.length+' قناة)');}).catch(function(){fbCopy(code);});}else{fbCopy(code);}
  };
  function fbCopy(t){var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.top='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('✓ تم نسخ رمز المزامنة');}catch(e){toast('❌ فشل النسخ');}document.body.removeChild(ta);}
  document.getElementById('btnSyncImpShow').onclick=function(){var w=document.getElementById('syncImpWrap');w.style.display=w.style.display==='none'?'block':'none';};
  document.getElementById('btnSyncDo').onclick=function(){
    var chs=applyCode(document.getElementById('syncIn').value);
    if(!chs){setSt('❌ رمز غير صالح');return;}
    CHS=chs;lset(KEY,CHS);aCat='الكل';favOnly=false;sq_v='';sqEl.value='';render();renderChmgr();
    document.getElementById('syncIn').value='';document.getElementById('syncImpWrap').style.display='none';
    setSt('✓ تم استيراد '+CHS.length+' قناة',true);toast('✓ مزامنة '+CHS.length+' قناة');closeAdm();
  };

  /* ── Export / Clear ── */
  document.getElementById('btnExp').onclick=function(){
    var b=new Blob([JSON.stringify(CHS,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='mus-channels.json';a.click();
  };
  document.getElementById('btnClr').onclick=function(){
    if(!confirm('مسح كل القنوات؟'))return;
    CHS=[];lset(KEY,CHS);killHls();curId=null;ctrl.classList.remove('show');
    showOv(false,'▶','MUS Player','اختر قناة للبدء');render();renderChmgr();toast('تم المسح');
  };

  /* ── Boot ── */
  render();
  showOv(false,'▶','MUS Player','اختر قناة للبدء');
  var isTV=window.innerWidth>=1024;
  if(isTV){document.getElementById('sidebar').classList.remove('closed');setTimeout(function(){focusGc(0);},400);}
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
  </script>
