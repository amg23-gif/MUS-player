<!DOCTYPE html>
  <html lang="ar" dir="rtl">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0c14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MUS Player</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <style>
  :root{--bg:#0a0c14;--bg2:#10131e;--bg3:#1a1e2d;--acc:#e62020;--text:#eef0f8;--text2:#8890aa;--border:#252836}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:Tahoma,Segoe UI,sans-serif;overflow:hidden}
  .hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);min-height:54px;z-index:100;position:relative}
  .logo-box{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .logo-icon{width:36px;height:36px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .logo-text .t1{font-size:14px;font-weight:700}
  .logo-text .t2{font-size:9px;color:var(--acc);letter-spacing:1px}
  .srch-box{flex:1;display:flex;align-items:center;background:var(--bg3);border-radius:8px;padding:0 10px;border:1px solid var(--border);min-width:0}
  .srch-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;padding:8px 4px;min-width:0;direction:rtl}
  .srch-box input::placeholder{color:var(--text2)}
  .ibtn{width:36px;height:36px;background:none;border:none;color:var(--text);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:background .15s}
  .ibtn:hover,.ibtn.on{background:var(--bg3)}
  .layout{display:flex;height:calc(100dvh - 54px);overflow:hidden}
  .sidebar{width:250px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s;overflow:hidden}
  .sidebar.closed{width:0;border:none}
  .cats{display:flex;flex-wrap:wrap;gap:4px;padding:8px;border-bottom:1px solid var(--border);flex-shrink:0;max-height:110px;overflow-y:auto}
  .cat{padding:3px 9px;border-radius:20px;font-size:12px;cursor:pointer;background:var(--bg3);color:var(--text2);border:1px solid transparent;white-space:nowrap}
  .cat.on{background:var(--acc);color:#fff}
  .cat:hover:not(.on){border-color:var(--acc)}
  .ch-list{flex:1;overflow-y:auto;padding:5px}
  .ch-list::-webkit-scrollbar{width:3px}
  .ch-list::-webkit-scrollbar-thumb{background:var(--bg3)}
  .ch-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;margin-bottom:2px}
  .ch-item:hover,.ch-item.on{background:var(--bg3)}
  .ch-item.on{border-right:3px solid var(--acc)}
  .ch-thumb{width:36px;height:26px;background:var(--bg);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;flex-shrink:0}
  .ch-thumb img{width:100%;height:100%;object-fit:contain}
  .ch-name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch-cat{font-size:10px;color:var(--text2)}
  .fav{font-size:13px;color:var(--text2);cursor:pointer;padding:0 2px;flex-shrink:0}
  .fav.on{color:gold}
  .no-ch{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:13px;gap:8px;text-align:center;padding:16px}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .player-wrap{position:relative;background:#000;flex-shrink:0;aspect-ratio:16/9;max-height:55vh;width:100%}
  #vid{width:100%;height:100%;display:block;background:#000;outline:none}
  .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,7,14,.93);z-index:10;transition:opacity .25s;gap:6px}
  .ov.gone{opacity:0;pointer-events:none}
  .spin{width:36px;height:36px;border:3px solid var(--bg3);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;display:none}
  @keyframes sp{to{transform:rotate(360deg)}}
  .ov-icon{font-size:48px}
  .ov-title{font-size:20px;font-weight:700;text-align:center;padding:0 10px}
  .ov-sub{font-size:12px;color:var(--text2);text-align:center;padding:0 20px}
  .err-row{display:none;align-items:center;gap:8px;padding:8px 12px;background:#180808;border-top:1px solid #4a0808;font-size:13px;color:#ff8a8a;flex-shrink:0;flex-wrap:wrap}
  .vlc-btn{background:var(--acc);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap}
  .cp-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
  .grid-area{flex:1;overflow-y:auto;padding:10px}
  .grid-area::-webkit-scrollbar{width:5px}
  .grid-area::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .gc{border-radius:9px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;transition:border .15s}
  .gc:hover,.gc.on{border-color:var(--acc);background:var(--bg3)}
  .gc.on{box-shadow:0 0 0 2px var(--acc)}
  .gc-logo{width:56px;height:38px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .gc-logo img{width:100%;height:100%;object-fit:contain;border-radius:3px}
  .gc-name{font-size:11px;font-weight:600;line-height:1.3;word-break:break-word}
  .gc-cat{font-size:10px;color:var(--text2)}
  .grid-empty{grid-column:1/-1;text-align:center;color:var(--text2);padding:30px;font-size:13px}
  .adm{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
  .adm.open{display:flex}
  .adm-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:540px;padding:18px;margin:auto}
  .adm-box h2{font-size:16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .adm-box h2 button{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}
  .f{margin-bottom:10px}
  .f label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
  .f input,.f textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;outline:none}
  .f textarea{min-height:80px;resize:vertical;font-family:monospace;direction:ltr;font-size:12px}
  .f input:focus,.f textarea:focus{border-color:var(--acc)}
  .frow{display:flex;gap:8px;flex-wrap:wrap}
  .frow .f{flex:1;min-width:100px}
  .abtn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin-left:6px}
  .abtn.p{background:var(--acc);color:#fff}
  .abtn.s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
  .abtn.d{background:#4a0808;color:#ff8a8a}
  .sep{border:none;border-top:1px solid var(--border);margin:14px 0}
  .adm-tip{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5;padding:8px;background:rgba(230,32,32,.08);border-radius:6px;border-right:3px solid var(--acc)}
  .toast{position:fixed;bottom:20px;right:50%;transform:translateX(50%);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:8px;font-size:13px;z-index:999;animation:tf 2.5s forwards}
  @keyframes tf{0%{opacity:0;transform:translateX(50%) translateY(8px)}15%{opacity:1;transform:translateX(50%)}80%{opacity:1}100%{opacity:0}}
  @media(max-width:640px){
    .layout{flex-direction:column}
    .sidebar{width:100%;border-left:none;border-bottom:1px solid var(--border);max-height:200px}
    .sidebar.closed{max-height:0}
    .player-wrap{aspect-ratio:unset;height:42vw;max-height:unset}
    .grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:7px}
  }
  </style>
  </head>
  <body>

  <div class="hdr">
    <button class="ibtn" id="menuBtn">☰</button>
    <button class="ibtn" id="favBtn">☆</button>
    <div class="srch-box">
      <span style="color:var(--text2);margin-left:4px">🔍</span>
      <input id="sq" type="search" placeholder="بحث عن قناة..." autocomplete="off" spellcheck="false">
    </div>
    <div class="logo-box">
      <div class="logo-icon">▶</div>
      <div class="logo-text"><div class="t1">MUS Player</div><div class="t2">LIVE TV & 4K</div></div>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar closed" id="sidebar">
      <div class="cats" id="cats"></div>
      <div class="ch-list" id="chList"></div>
    </div>
    <div class="main">
      <div class="player-wrap">
        <video id="vid" playsinline preload="none"></video>
        <div class="ov" id="ov">
          <div class="spin" id="spin"></div>
          <div class="ov-icon" id="ovIcon">▶</div>
          <div class="ov-title" id="ovTitle">MUS Player</div>
          <div class="ov-sub" id="ovSub">اختر قناة للبدء</div>
        </div>
      </div>
      <div class="err-row" id="errRow">
        <span id="errMsg" style="flex:1">—</span>
        <button class="vlc-btn" id="vlcBtn">▶ فتح في VLC</button>
        <button class="cp-btn" id="cpBtn">نسخ الرابط</button>
      </div>
      <div class="grid-area">
        <div class="grid" id="grid"></div>
      </div>
    </div>
  </div>

  <div class="adm" id="adm">
  <div class="adm-box">
    <h2>⚙️ لوحة التحكم <button id="closeAdm">✕</button></h2>

    <div class="adm-tip">
      💡 <strong>ملاحظة هامة:</strong> إذا كان رابط البث يبدأ بـ http:// والموقع على https:// 
      قد يحجبه المتصفح (mixed content). الحل: افتح الرابط بـ VLC، أو استخدم رابط HTTPS إن توفّر.
    </div>

    <div class="f">
      <label>رابط قائمة M3U / m3u_plus</label>
      <input type="url" id="m3uUrl" placeholder="http://server.com/get.php?username=X&password=Y&type=m3u_plus" dir="ltr">
    </div>
    <button class="abtn p" id="importM3u">📥 استيراد M3U</button>

    <hr class="sep">

    <div style="font-size:11px;color:var(--text2);margin-bottom:8px">أو أدخل بيانات Xtream Codes:</div>
    <div class="frow">
      <div class="f"><label>السيرفر</label><input id="xcSrv" placeholder="http://server.com:8080" dir="ltr"></div>
      <div class="f"><label>المستخدم</label><input id="xcUser" dir="ltr"></div>
      <div class="f"><label>كلمة المرور</label><input id="xcPass" dir="ltr"></div>
    </div>
    <button class="abtn p" id="xcImport">🔗 استيراد Xtream</button>

    <hr class="sep">

    <div class="frow">
      <div class="f"><label>اسم القناة</label><input id="aName"></div>
      <div class="f"><label>التصنيف</label><input id="aCat" value="عام"></div>
    </div>
    <div class="f"><label>رابط البث</label><input id="aUrl" dir="ltr"></div>
    <div class="f"><label>رابط الشعار (اختياري)</label><input id="aLogo" dir="ltr"></div>
    <button class="abtn p" id="addCh">➕ إضافة قناة</button>

    <hr class="sep">

    <button class="abtn s" id="expBtn">💾 تصدير</button>
    <button class="abtn d" id="clrBtn">🗑️ مسح الكل</button>

    <div id="admStatus" style="margin-top:10px;font-size:12px;color:var(--text2)"></div>
  </div>
  </div>

  <script>
  var TRIG='bouchta', KEY='mus_v2', FKEY='mus_fav';

  function defChs(){
    return [{id:'demo1',name:'بث تجريبي (يعمل)',url:'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8',cat:'تجريبي',logo:'',ar:''}];
  }
  function loadJ(k,d){ try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;} }
  function saveJ(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }

  var CHS  = (function(){ var a=loadJ(KEY,null); return (Array.isArray(a)&&a.length)?a:defChs(); })();
  var FAVS = loadJ(FKEY,[]);
  var curId=null, curUrl=null, aCat='الكل', srchQ='', favOnly=false, hls=null;
  var vid=document.getElementById('vid');

  function imgErr(img){ img.style.display='none'; }

  /* ── Player ── */
  function killHls(){
    if(hls){try{hls.destroy();}catch(e){} hls=null;}
    vid.pause(); vid.removeAttribute('src'); vid.load();
  }

  function setOv(loading,icon,title,sub){
    document.getElementById('spin').style.display=loading?'block':'none';
    document.getElementById('ovIcon').style.display=loading?'none':'block';
    document.getElementById('ovIcon').textContent=icon||'▶';
    document.getElementById('ovTitle').textContent=title||'MUS Player';
    document.getElementById('ovSub').textContent=sub||'';
    document.getElementById('ov').classList.remove('gone');
    document.getElementById('errRow').style.display='none';
  }

  function hideOv(){ document.getElementById('ov').classList.add('gone'); document.getElementById('errRow').style.display='none'; }

  function showErr(url,ch,msg){
    setOv(false,'⚠️',ch?ch.name:'خطأ',msg);
    var er=document.getElementById('errRow');
    er.style.display='flex';
    document.getElementById('errMsg').textContent=msg;
    document.getElementById('vlcBtn').onclick=function(){
      // Try vlc:// deep link (Android VLC) then intent:// fallback
      var tried=false;
      window.location.href='vlc://'+url;
      setTimeout(function(){
        if(!tried){ tried=true; window.open('intent://'+url.replace(/^https?:\/\//,'')+'#Intent;type=video/x-mpegURL;scheme=http;package=org.videolan.vlc;S.browser_fallback_url=https://play.google.com/store/apps/details?id=org.videolan.vlc;end','_blank'); }
      },1000);
    };
    document.getElementById('cpBtn').onclick=function(){
      if(navigator.clipboard) navigator.clipboard.writeText(url).then(function(){toast('✓ تم نسخ الرابط');});
      else{ var t=document.createElement('textarea');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);toast('✓ تم النسخ'); }
    };
  }

  function loadStream(url,ch){
    killHls();
    curUrl=url;
    setOv(true,'📺',ch?ch.name:'...','جاري التحميل...');

    // Upgrade HTTP→HTTPS to avoid mixed-content blocking on HTTPS pages
    var secUrl=url;
    if(/^http:\/\//.test(url)){
      secUrl='https://'+url.slice(7).replace(/:80\//,'/').replace(/:80$/,'');
    }

    function tryNative(u,fallback){
      vid.oncanplay=null; vid.onerror=null;
      vid.src=u; vid.load();
      var done=false;
      var t=setTimeout(function(){ if(!done){vid.oncanplay=vid.onerror=null; fallback&&fallback();} },4000);
      vid.oncanplay=function(){ if(done)return; done=true; clearTimeout(t); vid.oncanplay=vid.onerror=null; hideOv(); vid.play().catch(function(){}); };
      vid.onerror=function(){ if(done)return; done=true; clearTimeout(t); vid.oncanplay=vid.onerror=null; fallback&&fallback(); };
    }

    function tryHlsJs(u,fallback){
      if(!window.Hls||!Hls.isSupported()){fallback&&fallback();return;}
      killHls();
      hls=new Hls({enableWorker:false,maxBufferLength:20,maxMaxBufferLength:40,fragLoadingTimeOut:10000,manifestLoadingTimeOut:10000});
      hls.loadSource(u);
      hls.attachMedia(vid);
      hls.once(Hls.Events.MANIFEST_PARSED,function(){ hideOv(); vid.play().catch(function(){}); });
      hls.on(Hls.Events.ERROR,function(e,d){
        if(d.fatal){ killHls(); fallback&&fallback(); }
      });
    }

    // Strategy:
    // 1. Try native with HTTPS URL (works on iOS, Safari, smart TVs)
    // 2. Try HLS.js with HTTPS URL (Chrome, Firefox)
    // 3. Try native with original URL (may work on some Android browsers)
    // 4. Show error + VLC button

    tryNative(secUrl, function(){
      tryHlsJs(secUrl, function(){
        if(secUrl!==url){
          tryNative(url, function(){
            tryHlsJs(url, function(){
              showErr(url, ch, 'البث محجوب في المتصفح — افتح بـ VLC');
            });
          });
        } else {
          showErr(url, ch, 'تعذّر تشغيل البث — جرّب VLC');
        }
      });
    });
  }

  /* ── Channels ── */
  function nextId(){ return Date.now()+'-'+Math.random().toString(36).slice(2,5); }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function playCh(id){
    var ch=CHS.find(function(c){return c.id===id;});
    if(!ch) return;
    curId=id; loadStream(ch.url,ch); render();
  }

  function toggleFav(id){
    var i=FAVS.indexOf(id);
    if(i>-1) FAVS.splice(i,1); else FAVS.push(id);
    saveJ(FKEY,FAVS); render();
  }

  function setCat(c){ aCat=c; render(); }

  function getList(){
    var list=CHS.slice();
    if(favOnly) list=list.filter(function(c){return FAVS.indexOf(c.id)>-1;});
    if(aCat!=='الكل') list=list.filter(function(c){return c.cat===aCat;});
    if(srchQ) list=list.filter(function(c){return (c.name+' '+(c.cat||'')).toLowerCase().indexOf(srchQ)>-1;});
    return list;
  }

  /* ── Render ── */
  function mkLogo(logo,big){
    if(logo&&logo.trim()){
      var s=big?'width:100%;height:100%;object-fit:contain':'width:100%;height:100%;object-fit:contain';
      return '<img src="'+esc(logo)+'" onerror="imgErr(this)" style="'+s+'">';
    }
    return big?'<span style="font-size:24px">📺</span>':'📺';
  }

  function render(){
    var list=getList();
    var cats=['الكل'];
    CHS.forEach(function(c){if(c.cat&&cats.indexOf(c.cat)<0)cats.push(c.cat);});

    // Cats
    var catHtml='';
    cats.forEach(function(c){
      catHtml+='<div class="cat'+(aCat===c?' on':'')+'" data-cat="'+esc(c)+'">'+esc(c)+'</div>';
    });
    document.getElementById('cats').innerHTML=catHtml;

    // Sidebar
    var sb='';
    if(!list.length){
      sb='<div class="no-ch"><div style="font-size:36px">📭</div><div>لا توجد قنوات</div></div>';
    } else {
      list.forEach(function(c){
        var on=c.id===curId, fav=FAVS.indexOf(c.id)>-1;
        sb+='<div class="ch-item'+(on?' on':'')+'" data-cid="'+esc(c.id)+'">'
          +'<div class="ch-thumb">'+mkLogo(c.logo,false)+'</div>'
          +'<div style="flex:1;min-width:0"><div class="ch-name">'+esc(c.name)+'</div><div class="ch-cat">'+esc(c.cat||'')+'</div></div>'
          +'<span class="fav'+(fav?' on':'')+'" data-fav="'+esc(c.id)+'">'+(fav?'★':'☆')+'</span>'
          +'</div>';
      });
    }
    document.getElementById('chList').innerHTML=sb;

    // Grid
    var gr='';
    if(!list.length){
      gr='<div class="grid-empty">لا توجد نتائج</div>';
    } else {
      list.forEach(function(c){
        var on=c.id===curId;
        gr+='<div class="gc'+(on?' on':'')+'" data-cid="'+esc(c.id)+'">'
          +'<div class="gc-logo">'+mkLogo(c.logo,true)+'</div>'
          +'<div class="gc-name">'+esc(c.name)+'</div>'
          +'<div class="gc-cat">'+esc(c.cat||'')+'</div>'
          +'</div>';
      });
    }
    document.getElementById('grid').innerHTML=gr;

    document.getElementById('favBtn').textContent=favOnly?'★':'☆';
    document.getElementById('favBtn').className='ibtn'+(favOnly?' on':'');
  }

  /* ── Events ── */
  document.getElementById('cats').addEventListener('click',function(e){
    var el=e.target.closest('[data-cat]'); if(el) setCat(el.dataset.cat);
  });
  document.getElementById('chList').addEventListener('click',function(e){
    var fav=e.target.closest('[data-fav]');
    if(fav){e.stopPropagation();toggleFav(fav.dataset.fav);return;}
    var item=e.target.closest('[data-cid]'); if(item) playCh(item.dataset.cid);
  });
  document.getElementById('grid').addEventListener('click',function(e){
    var item=e.target.closest('[data-cid]'); if(item) playCh(item.dataset.cid);
  });

  var sq=document.getElementById('sq');
  sq.addEventListener('input',function(){
    var v=this.value;
    if(v===TRIG){this.value='';openAdm();return;}
    srchQ=v.toLowerCase().trim(); render();
  });

  document.getElementById('menuBtn').addEventListener('click',function(){
    document.getElementById('sidebar').classList.toggle('closed');
  });
  document.getElementById('favBtn').addEventListener('click',function(){favOnly=!favOnly;render();});

  document.addEventListener('keydown',function(e){
    if(document.getElementById('adm').classList.contains('open')){ if(e.key==='Escape') closeAdm(); return; }
    var list=getList(),idx=curId?list.findIndex(function(c){return c.id===curId;}):-1;
    if(e.key==='ArrowDown'&&idx<list.length-1){ e.preventDefault(); playCh(list[idx+1].id); }
    else if(e.key==='ArrowUp'&&idx>0){ e.preventDefault(); playCh(list[idx-1].id); }
    else if((e.key==='Enter'||e.key===' ')&&vid.src){ e.preventDefault(); vid.paused?vid.play():vid.pause(); }
  });

  /* ── Toast ── */
  function toast(msg){
    var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(function(){t.parentNode&&t.parentNode.removeChild(t);},2800);
  }

  /* ── Admin ── */
  function openAdm(){ document.getElementById('adm').classList.add('open'); setStatus(''); }
  function closeAdm(){ document.getElementById('adm').classList.remove('open'); }
  function setStatus(msg,ok){ var el=document.getElementById('admStatus'); el.textContent=msg; el.style.color=ok?'#4caf50':'var(--text2)'; }

  document.getElementById('closeAdm').addEventListener('click',closeAdm);
  document.getElementById('adm').addEventListener('click',function(e){ if(e.target===this) closeAdm(); });

  function parseM3u(text){
    var lines=text.split('\n'), out=[], cur=null;
    lines.forEach(function(line){
      line=line.trim();
      if(line.startsWith('#EXTINF')){
        cur={id:nextId(),name:'',url:'',cat:'عام',logo:'',ar:''};
        var nm=line.match(/,(.+)$/); if(nm) cur.name=nm[1].trim();
        var lg=line.match(/tvg-logo="([^"]*)"/); if(lg) cur.logo=lg[1];
        var ct=line.match(/group-title="([^"]*)"/); if(ct) cur.cat=ct[1]||'عام';
      } else if(line&&!line.startsWith('#')&&cur){
        cur.url=line; out.push(cur); cur=null;
      }
    });
    return out;
  }

  function fetchWithProxy(url){
    return fetch(url).catch(function(){
      // CORS fallback via public proxy
      return fetch('https://corsproxy.io/?'+encodeURIComponent(url));
    });
  }

  document.getElementById('importM3u').addEventListener('click',function(){
    var url=document.getElementById('m3uUrl').value.trim();
    if(!url){setStatus('أدخل رابط M3U');return;}
    setStatus('جاري الاستيراد...');
    fetchWithProxy(url).then(function(r){return r.text();}).then(function(text){
      var chs=parseM3u(text);
      if(!chs.length){setStatus('لم تُعثر على قنوات في القائمة');return;}
      CHS=chs; saveJ(KEY,CHS); render();
      setStatus('✓ تم استيراد '+chs.length+' قناة',true); toast('✓ '+chs.length+' قناة');
    }).catch(function(e){setStatus('خطأ: '+e.message);});
  });

  document.getElementById('xcImport').addEventListener('click',function(){
    var srv=document.getElementById('xcSrv').value.trim().replace(/\/$/,'');
    var usr=document.getElementById('xcUser').value.trim();
    var pas=document.getElementById('xcPass').value.trim();
    if(!srv||!usr||!pas){setStatus('أدخل السيرفر والمستخدم وكلمة المرور');return;}
    // Try HTTPS version of the server first
    var base=srv.replace(/^http:\/\//,'https://').replace(/:80$/,'');
    var url=base+'/get.php?username='+encodeURIComponent(usr)+'&password='+encodeURIComponent(pas)+'&type=m3u_plus&output=ts';
    setStatus('جاري الاستيراد ('+url.slice(0,40)+'...)');
    fetchWithProxy(url).then(function(r){return r.text();}).then(function(text){
      if(!text.startsWith('#EXTM3U')&&!text.includes('#EXTINF')) throw new Error('استجابة غير صالحة');
      var chs=parseM3u(text);
      if(!chs.length) throw new Error('لم تُعثر على قنوات');
      CHS=chs; saveJ(KEY,CHS); render();
      setStatus('✓ تم استيراد '+chs.length+' قناة',true); toast('✓ '+chs.length+' قناة');
    }).catch(function(e){setStatus('خطأ: '+e.message+'. جرّب لصق رابط M3U مباشرة.');});
  });

  document.getElementById('addCh').addEventListener('click',function(){
    var name=document.getElementById('aName').value.trim();
    var url=document.getElementById('aUrl').value.trim();
    var cat=document.getElementById('aCat').value.trim()||'عام';
    var logo=document.getElementById('aLogo').value.trim();
    if(!name||!url){setStatus('أدخل الاسم والرابط');return;}
    CHS.push({id:nextId(),name:name,url:url,cat:cat,logo:logo,ar:''});
    saveJ(KEY,CHS); render();
    document.getElementById('aName').value='';
    document.getElementById('aUrl').value='';
    document.getElementById('aLogo').value='';
    setStatus('✓ تمت الإضافة',true); toast('✓ تمت الإضافة');
  });

  document.getElementById('expBtn').addEventListener('click',function(){
    var b=new Blob([JSON.stringify(CHS,null,2)],{type:'application/json'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='mus-channels.json'; a.click();
  });

  document.getElementById('clrBtn').addEventListener('click',function(){
    if(!confirm('مسح كل القنوات؟')) return;
    CHS=[]; saveJ(KEY,CHS); killHls(); curId=null; curUrl=null;
    setOv(false,'▶','MUS Player','اختر قناة للبدء'); render(); toast('تم المسح');
  });

  /* ── Boot ── */
  render();
  setOv(false,'▶','MUS Player','اختر قناة للبدء');
  if(window.innerWidth>=1024) document.getElementById('sidebar').classList.remove('closed');
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
  </script>
  </body>
  </html>
