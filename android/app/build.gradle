plugins {
      id 'com.android.application'
  }

  android {
      namespace 'com.musplayer.app'
      compileSdk 34

      defaultConfig {
          applicationId "com.musplayer.app"
          minSdk 21
          targetSdk 34
          versionCode 1
          versionName "1.0"
      }

      buildTypes {
          release {
              minifyEnabled false
              signingConfig signingConfigs.debug
          }
      }

      compileOptions {
          sourceCompatibility JavaVersion.VERSION_17
          targetCompatibility JavaVersion.VERSION_17
      }
  }
  