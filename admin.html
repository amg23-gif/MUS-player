<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MUS Player - تسجيل الدخول</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#07090f;color:#fff;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
  .logo{font-size:48px}
  h1{font-size:18px;color:#aaa}
  .bar{width:260px;background:#1a1d2e;border-radius:12px;padding:4px;overflow:hidden}
  .fill{height:10px;background:linear-gradient(90deg,#e00,#f50);border-radius:8px;width:0%;transition:width 0.3s}
  p{font-size:13px;color:#666;text-align:center}
</style>
</head>
<body>
<div class="logo">⚙️</div>
<h1>جاري مسح الكاش وفتح لوحة التحكم...</h1>
<div class="bar"><div class="fill" id="fill"></div></div>
<p id="msg">تنظيف...</p>
<script>
var fill = document.getElementById('fill');
var msg = document.getElementById('msg');
var step = 0;

function go() {
  if(step===0){fill.style.width='20%';msg.textContent='إلغاء تسجيل Service Worker...';}
  if(step===1){fill.style.width='50%';msg.textContent='مسح الكاش القديم...';}
  if(step===2){fill.style.width='80%';msg.textContent='تحميل النسخة الجديدة...';}
  if(step===3){fill.style.width='100%';msg.textContent='جاهز! جاري الفتح...';}
  step++;
}

go();

Promise.all([
  navigator.serviceWorker ? navigator.serviceWorker.getRegistrations().then(function(regs){
    return Promise.all(regs.map(function(r){return r.unregister();}));
  }) : Promise.resolve(),
  window.caches ? caches.keys().then(function(keys){
    return Promise.all(keys.map(function(k){go();return caches.delete(k);}));
  }) : Promise.resolve()
]).then(function(){
  go();
  go();
  setTimeout(function(){
    window.location.replace('/MUS-player/?admin&nocache=' + Date.now());
  }, 800);
}).catch(function(){
  window.location.replace('/MUS-player/?admin&nocache=' + Date.now());
});
</script>
</body>
</html>
